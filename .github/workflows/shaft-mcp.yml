name: shaft-mcp

on:
  schedule:
    - cron: '00 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  installer-script-tests:
    name: Installer script tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-2025]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true
      - name: Run isolated installer script verification
        run: python scripts/ci/verify_shaft_mcp_installer_release.py

  package-and-smoke:
    needs: installer-script-tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.12
      - name: Validate reactor versions
        run: |
          python3 scripts/ci/validate_reactor_versions.py
          python3 scripts/ci/validate_shaft_mcp_configuration.py
      - name: Run MCP module tests
        env:
          MCP_RELATED_TESTS: ShaftMcpApplicationTests#contextRegistersExpectedLeanMcpToolApi,CaptureServiceTest#codeBlocksToolGeneratesReusableReplaySnippetsInsideWorkspace,CaptureServiceTest#checkpointToolRequiresActiveCaptureSession,CaptureServiceTest#codeBlocksRejectSessionOutsideWorkspace,DoctorServiceTest#toolAnalyzesAllowlistedEvidenceOffline,DoctorServiceTest#documentedExternalClientsInvokeDoctorAnalyzeWithoutCredentials,DoctorServiceTest#failedAllureAnalysisRejectsPathsOutsideWorkspace,DoctorServiceTest#draftPublicationRequiresExplicitApprovalBeforeReadingManifest,MobileRecordingServiceTest#recordingGeneratesRedactedReplayCodeInsideWorkspace,MobileRecordingServiceTest#recordingCodeBlocksRejectPathOutsideWorkspace
        run: >-
          mvn --batch-mode -pl shaft-mcp -am test
          -Dtest="${MCP_RELATED_TESTS}"
          -Dsurefire.failIfNoSpecifiedTests=false
          -DheadlessExecution=true
          -Dgpg.skip
      - name: Upload coverage to Codecov
        if: always()
        uses: ./.github/actions/upload-jacoco-coverage
        with:
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ./target/jacoco/jacoco.xml,
            ./shaft-engine/target/jacoco/jacoco.xml,
            ./shaft-mcp/target/jacoco/jacoco.xml
          required-files: ./shaft-mcp/target/jacoco/jacoco.xml
      - name: Verify MCP Allure results
        run: test -n "$(find shaft-mcp/allure-results -name '*-result.json' -type f -print -quit)"
      - name: Package and smoke transports
        run: |
          mvn --batch-mode -pl shaft-mcp -am install -DskipTests -Dgpg.skip
          mvn --batch-mode -pl shaft-mcp dependency:copy-dependencies -DincludeScope=runtime '-DoutputDirectory=${maven.multiModuleProjectDirectory}/shaft-mcp/target/dependency' -DskipTests -Dgpg.skip
          python3 scripts/ci/validate_shaft_mcp_transports.py
      - name: Build container
        run: docker build -f shaft-mcp/Dockerfile -t shaft-mcp:test .
      - name: Smoke container startup
        shell: bash
        run: |
          cleanup() {
            docker rm -f shaft-mcp-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run -d --name shaft-mcp-smoke \
            -e SPRING_PROFILES_ACTIVE=http \
            -p 127.0.0.1:8081:8081 \
            shaft-mcp:test
          for attempt in {1..60}; do
            if curl --fail --silent --show-error \
              -H 'Accept: application/json, text/event-stream' \
              -H 'Content-Type: application/json' \
              --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"container-smoke","version":"1.0"}}}' \
              http://127.0.0.1:8081/mcp | grep -q '"name":"shaft-mcp"'; then
              exit 0
            fi
            sleep 1
          done
          docker logs shaft-mcp-smoke
          exit 1

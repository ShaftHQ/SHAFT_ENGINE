name: Publish IntelliJ Plugin

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    # Runs only for an actual published SHAFT release (created by mavenCentral_cd.yml's
    # announce_release job), not merely because that workflow's run concluded successfully -
    # its build_release_and_deliver job now also concludes successfully when it skips a
    # no-op delivery for an already-published version, which must not re-publish here.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    runs-on: ubuntu-22.04
    env:
      ORG_GRADLE_PROJECT_intellijPlatformPublishingToken: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
      ORG_GRADLE_PROJECT_intellijPlatformCertificateChain: ${{ secrets.JETBRAINS_PLUGIN_CERTIFICATE_CHAIN }}
      ORG_GRADLE_PROJECT_intellijPlatformPrivateKey: ${{ secrets.JETBRAINS_PLUGIN_PRIVATE_KEY }}
      ORG_GRADLE_PROJECT_intellijPlatformPrivateKeyPassword: ${{ secrets.JETBRAINS_PLUGIN_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - name: Validate release metadata
        run: python3 scripts/ci/validate_shaft_pilot_release.py
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'
          check-latest: true
      - name: Set up Gradle 9
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.0.0'
      - name: Validate Marketplace secrets
        shell: bash
        run: |
          missing=0
          for name in \
            ORG_GRADLE_PROJECT_intellijPlatformPublishingToken \
            ORG_GRADLE_PROJECT_intellijPlatformCertificateChain \
            ORG_GRADLE_PROJECT_intellijPlatformPrivateKey \
            ORG_GRADLE_PROJECT_intellijPlatformPrivateKeyPassword; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required to publish the IntelliJ plugin"
              missing=1
            fi
          done
          exit "$missing"
      - name: Publish to JetBrains Marketplace
        run: gradle -p shaft-intellij check buildPlugin verifyPlugin signPlugin publishPlugin

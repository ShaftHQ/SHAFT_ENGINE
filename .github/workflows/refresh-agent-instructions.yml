name: Refresh Agent Instructions

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why an AI review is needed or what drift should be corrected
        required: true
        type: string
      force_ai:
        description: Run the paid AI review even when the deterministic audit passes
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-agent-instructions
  cancel-in-progress: false

jobs:
  refresh-agent-instructions:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Default Branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Audit Current Guidance
        id: audit
        shell: bash
        env:
          FORCE_AI: ${{ inputs.force_ai }}
          REFRESH_REASON: ${{ inputs.reason }}
        run: |
          set +e
          python3 scripts/ci/validate_agent_setup.py --format json > .agent-guidance-audit.json
          audit_status=$?
          set -e

          cat .agent-guidance-audit.json
          if [ "$FORCE_AI" = "true" ] || [ "$audit_status" -ne 0 ]; then
            echo "needs_ai=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_ai=false" >> "$GITHUB_OUTPUT"
            echo "Guidance is valid; skipping the paid AI action."
          fi

          python3 - <<'PY'
          import os
          from pathlib import Path

          Path(".agent-guidance-refresh-request.md").write_text(
              "# Agent Guidance Refresh Request\n\n"
              f"Reason: {os.environ['REFRESH_REASON']}\n\n"
              "Read `.agent-guidance-audit.json` and change only the surfaces "
              "needed to address its violations or the stated reason.\n",
              encoding="utf-8",
          )
          PY

      - name: Run Codex Agent Instruction Refresh
        if: steps.audit.outputs.needs_ai == 'true'
        id: run-codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/refresh-agent-instructions.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          allow-bots: true

      - name: Remove Temporary Audit Context
        if: always()
        shell: bash
        run: rm -f .agent-guidance-audit.json .agent-guidance-refresh-request.md

      - name: Validate Final Guidance
        run: python3 scripts/ci/validate_agent_setup.py

      - name: Check Changes and Enforce Allowlist
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t changed_files < <(
            {
              git diff --name-only --diff-filter=ACMRTD
              git ls-files --others --exclude-standard
            } | sort -u
          )

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "No agent instruction changes were proposed."
            exit 0
          fi

          disallowed_files=()
          for file in "${changed_files[@]}"; do
            case "$file" in
              AGENTS.md|CLAUDE.md|CONTRIBUTING.md)
                ;;
              .github/copilot-instructions.md|.github/pull_request_template.md)
                ;;
              .agents/skills/*|.github/instructions/*|.github/skills/*)
                ;;
              *)
                disallowed_files+=("$file")
                ;;
            esac
          done

          if [ "${#disallowed_files[@]}" -gt 0 ]; then
            echo "::error::Codex changed files outside the guidance allowlist."
            printf 'Disallowed files:\n'
            printf ' - %s\n' "${disallowed_files[@]}"
            exit 1
          fi

          echo "changes=true" >> "$GITHUB_OUTPUT"
          {
            echo 'files<<EOF'
            printf -- '- `%s`\n' "${changed_files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs: refresh agent guidance'
          branch: automation/refresh-agent-instructions
          delete-branch: true
          title: 'docs: refresh agent guidance'
          body: |
            ## Summary
            This PR updates agent guidance after a deterministic budget and
            consistency audit.

            **Requested reason:** ${{ inputs.reason }}

            ### Changed files
            ${{ steps.changes.outputs.files }}

            ## Validation
            - `python3 scripts/ci/validate_agent_setup.py`
            - Paid AI review ran only because the audit found drift or
              `force_ai` was selected.

            ## Agent summary
            ${{ steps.run-codex.outputs.final-message }}

            No product code was intentionally changed.

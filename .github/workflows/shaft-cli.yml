name: shaft-cli

on:
  pull_request:
    paths:
      - 'shaft-cli/**'
      - 'pom.xml'
      - '.github/workflows/shaft-cli.yml'
  push:
    branches: [ main ]
    paths:
      - 'shaft-cli/**'
      - 'pom.xml'
      - '.github/workflows/shaft-cli.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shaft-cli-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2025]
    steps:
      # .memory relation filenames exceed MAX_PATH with the runner workspace prefix;
      # without long paths, git checkout itself fails on Windows runners.
      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true
          cache: 'maven'
      - name: Test shaft-cli
        run: mvn --batch-mode -pl shaft-cli test '-DheadlessExecution=true'
      - name: Package shaft-cli and run the binary
        shell: bash
        run: |
          mvn --batch-mode -pl shaft-cli package -DskipTests '-DheadlessExecution=true' -q
          java -jar shaft-cli/target/shaft-cli-*[0-9].jar --version
          java -jar shaft-cli/target/shaft-cli-*[0-9].jar --help

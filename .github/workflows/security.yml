name: Security

# Phase 3 of the CI overhaul (issue #3814, B1): dependency-review moved to
# pr-gate.yml's own `dependency-review` job. This workflow now carries only
# CodeQL, which stays here rather than folding into pr-gate.yml because no
# org-wide CodeQL default setup is configured for this repository.

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.5

      - name: Build all Java-bearing SHAFT modules
        run: mvn -B -pl shaft-engine,shaft-pilot-core,shaft-capture,shaft-capture-proxy,shaft-doctor,shaft-ai,shaft-heal,shaft-browserstack,shaft-video,shaft-visual,shaft-sikulix,shaft-mcp,report-aggregate -am clean package --file pom.xml -DskipTests -Dgpg.skip

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

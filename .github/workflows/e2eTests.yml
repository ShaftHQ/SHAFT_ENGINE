name: E2E Tests

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '00 1 * * *'
  workflow_dispatch:

env:
  GLOBAL_TESTING_SCOPE: "!%regex[.*DatabaseActions.*], !%regex[.*CLI.*], !%regex[.*DB.*], !%regex[.*Db.*], !%regex[.*db.*], !%regex[.*API.*], !%regex[.*Api.*], !%regex[.*api.*], !%regex[.*uestBuilder.*], !%regex[.*Rest.*], !%regex[.*Json.*], !%regex[.*JSON.*], !%regex[.*json.*], !%regex[.*ndroid.*], !%regex[.*IOS.*], !%regex[.*MobileWeb.*], !%regex[.*appium.Mobile.*], !%regex[.*properties.Mobile.*], !%regex[.*CucumberTests.*], !%regex[.*LT.*], !%regex[.*Flutter.*], !%regex[.*MoonTests.*]"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  Workflow_Summary:
    if: always()
    needs:
      - Ubuntu_Database
      - Ubuntu_APIs
      - Ubuntu_Visual_Module
      - Ubuntu_Desktop_Video_Module
      - Ubuntu_Firefox_Grid
      - Ubuntu_Chrome_Grid
      - Ubuntu_MicrosoftEdge_Grid
      - Android_Native_BrowserStack
      - iOS_Web_SAFARI_BrowserStack
      - Android_Web_Chrome_BrowserStack
      - MacOSX_Safari_BrowserStack
      - Ubuntu_Chrome_Cucumber_Grid
      - MacOSX_Safari_Cucumber_BrowserStack
      - Windows_Edge_Local
      - MacOSX_Safari_Local
      - Windows_Chrome_Local
      - MacOSX_Chrome_Local
      - Windows_Edge_Cucumber_Local
      - Ubuntu_Chrome_Moon
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Consolidate Test Results
        uses: ./.github/actions/consolidate-test-results
        with:
          needs-json: ${{ toJSON(needs) }}

  Ubuntu_Database:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Connect to PostgreSQL
        run: |
            cd shaft-engine/src/main/resources/docker-compose/postgres/
            npm install pg
            node client.js
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DretryMaximumNumberOfAttempts=2" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*DatabaseActions.*], %regex[.*DB.*], %regex[.*Db.*], %regex[.*db.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_Database
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Ubuntu_APIs:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=2" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*API.*], %regex[.*Api.*], %regex[.*PathParamTest.*], %regex[.*SwaggerContractTest.*], %regex[.*uestBuilder.*], %regex[.*Rest.*], %regex[.*Json.*], %regex[.*JSON.*], %regex[.*json.*], %regex[.*YAML.*], %regex[.*Yaml.*], %regex[.*yaml.*], %regex[.*CLIWizard.*], %regex[.*TerminalActions.*], %regex[.*properties.Mobile.*], %regex[.*CSVFileManagerUnitTest.*], %regex[.*PdfFileManager.*], %regex[.*ExcelFileManager.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_APIs
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Ubuntu_Visual_Module:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Run visual module tests
        continue-on-error: true
        run: mvn -pl shaft-visual -am -e test "-DretryMaximumNumberOfAttempts=1" "-DgenerateAllureReportArchive=true" "-Dtest=ImageProcessingActionsUnitTest"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_Visual_Module
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          module-directory: shaft-visual

  Ubuntu_Desktop_Video_Module:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Run desktop video module tests
        continue-on-error: true
        run: mvn -pl shaft-video -am -e test "-DretryMaximumNumberOfAttempts=1" "-DgenerateAllureReportArchive=true" "-Dtest=DesktopVideoRecordingProviderRegistrationTest"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_Desktop_Video_Module
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          module-directory: shaft-video

  Ubuntu_Firefox_Grid:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up Native Selenium Grid
        run: docker compose -f shaft-engine/src/main/resources/docker-compose/selenium4.yml up --scale chrome=0 --scale edge=0 --scale firefox=10 -d
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Check running containers
        run: docker ps
      - name: Install optional visual test runtime
        run: mvn -pl shaft-visual -am -e install "-DskipTests" "-Dgpg.skip" "-Dcyclonedx.skip"
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DincludeVisualTestRuntime" "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=DYNAMIC" "-DsetParallel=METHODS" "-DretryMaximumNumberOfAttempts=2" "-DexecutionAddress=http://localhost:4444" "-DtargetOperatingSystem=LINUX" "-DtargetBrowserName=firefox" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${GLOBAL_TESTING_SCOPE}"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_Firefox_Grid
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Ubuntu_Chrome_Grid:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up Native Selenium Grid
        run: docker compose -f shaft-engine/src/main/resources/docker-compose/selenium4.yml up --scale chrome=10 --scale edge=0 --scale firefox=0 -d
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Check running containers
        run: docker ps
      - name: Install optional visual test runtime
        run: mvn -pl shaft-visual -am -e install "-DskipTests" "-Dgpg.skip" "-Dcyclonedx.skip"
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DincludeVisualTestRuntime" "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=DYNAMIC" "-DsetParallel=METHODS" "-DretryMaximumNumberOfAttempts=2" "-DexecutionAddress=http://localhost:4444" "-DtargetOperatingSystem=LINUX" "-DtargetBrowserName=chrome" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${GLOBAL_TESTING_SCOPE}"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_Chrome_Grid
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Ubuntu_MicrosoftEdge_Grid:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up Native Selenium Grid
        run: docker compose -f shaft-engine/src/main/resources/docker-compose/selenium4.yml up --scale chrome=0 --scale edge=10 --scale firefox=0 -d
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Check running containers
        run: docker ps
      - name: Install optional visual test runtime
        run: mvn -pl shaft-visual -am -e install "-DskipTests" "-Dgpg.skip" "-Dcyclonedx.skip"
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DincludeVisualTestRuntime" "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=DYNAMIC" "-DsetParallel=METHODS" "-DretryMaximumNumberOfAttempts=2" "-DexecutionAddress=http://localhost:4444" "-DtargetOperatingSystem=LINUX" "-DtargetBrowserName=MicrosoftEdge" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${GLOBAL_TESTING_SCOPE}"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_MicrosoftEdge_Grid
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Android_Native_BrowserStack:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Install optional visual test runtime
        run: mvn -pl shaft-visual -am -e install "-DskipTests" "-Dgpg.skip" "-Dcyclonedx.skip"
      - name: Run tests
        continue-on-error: true
        timeout-minutes: 40
        run: mvn -pl shaft-browserstack -am -e test "-DincludeVisualTestRuntime" "-DdefaultElementIdentificationTimeout=60" "-DretryMaximumNumberOfAttempts=2" "-DexecutionAddress=browserstack" "-DtargetOperatingSystem=android" "-Dmobile_automationName=UIAutomator2" "-DbrowserStack.platformVersion=13.0" "-DbrowserStack.deviceName=Google Pixel 7" "-DbrowserStack.appUrl=" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*ndroid.*], %regex[.*FlutterTest.*], %regex[.*BrowserStackPropertiesUnitTest.*], %regex[.*BrowserStackHelperUnitTest.*], %regex[.*BrowserStackSdkHelperCoverageUnitTest.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Android_Native_BrowserStack
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  iOS_Web_SAFARI_BrowserStack:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-browserstack -am -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=2" "-DexecutionAddress=browserstack" "-DtargetOperatingSystem=iOS" "-Dmobile_automationName=XCuiTest" "-DbrowserStack.osVersion=16" "-DbrowserStack.deviceName=iPhone 14" "-DbrowserName=safari" "-DbrowserStack.appName=" "-DbrowserStack.appRelativeFilePath=" "-DbrowserStack.appUrl=" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*MobileWebTest.*], %regex[.*IOSBasicInteractionsTest.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: iOS_Web_SAFARI_BrowserStack
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Android_Web_Chrome_BrowserStack:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-browserstack -am -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=2" "-DexecutionAddress=browserstack" "-DtargetOperatingSystem=android" "-Dmobile_automationName=UIAutomator2" "-DbrowserStack.osVersion=13.0" "-DbrowserStack.deviceName=Samsung Galaxy S23" "-DbrowserName=chrome" "-DbrowserStack.appName=" "-DbrowserStack.appRelativeFilePath=" "-DbrowserStack.appUrl=" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*MobileWebTest.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Android_Web_Chrome_BrowserStack
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  MacOSX_Safari_BrowserStack:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-browserstack -am -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=2" "-DexecutionAddress=browserstack" "-DtargetOperatingSystem=MAC" "-DtargetBrowserName=Safari" "-DbrowserStack.os=OS X" "-DbrowserStack.osVersion=Sonoma" "-DbrowserStack.browserVersion=17.0" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*BrowserActionsTests.*], %regex[.*BigPageActionsTest.*], %regex[.*BrowserStackPropertiesUnitTest.*], %regex[.*BrowserStackHelperUnitTest.*], %regex[.*BrowserStackSdkHelperCoverageUnitTest.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: MacOSX_Safari_BrowserStack
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Ubuntu_Chrome_Cucumber_Grid:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up Native Selenium Grid
        run: docker compose -f shaft-engine/src/main/resources/docker-compose/selenium4.yml up --scale chrome=10 --scale edge=0 --scale firefox=0 -d
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: 'lts/*'
      - name: Check running containers
        run: docker ps
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=DYNAMIC" "-DsetParallel=METHODS" "-DretryMaximumNumberOfAttempts=2" "-DexecutionAddress=http://localhost:4444" "-DtargetOperatingSystem=LINUX" "-DtargetBrowserName=chrome" "-DmaximumPerformanceMode=2" "-DgenerateAllureReportArchive=true" "-Dcucumber.features=src/test/resources/CucumberFeatures,src/test/resources/CustomCucumberFeatures" "-Dcucumber.glue=customCucumberSteps,com.shaft.cucumber" "-Dcucumber.plugin=pretty,json:allure-results/cucumber.json,html:allure-results/cucumberReport.html,com.shaft.listeners.CucumberTestRunnerListener" "-Dtest=%regex[.*(CucumberTests|CucumberFeatureListenerUnitTest|CucumberTestRunnerListenerUnitTest).*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_Chrome_Cucumber_Grid
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  MacOSX_Safari_Cucumber_BrowserStack:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: 'lts/*'
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-browserstack -am -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=2" "-DexecutionAddress=browserstack" "-DtargetOperatingSystem=MAC" "-DtargetBrowserName=Safari" "-DmaximumPerformanceMode=1" "-DbrowserStack.os=OS X" "-DbrowserStack.osVersion=Sonoma" "-DbrowserStack.browserVersion=17.0" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*CucumberTests.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: MacOSX_Safari_Cucumber_BrowserStack
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Windows_Edge_Local:
    runs-on: windows-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Install optional visual test runtime
        run: mvn -pl shaft-visual -am -e install "-DskipTests" "-Dgpg.skip"
      - name: Print Edge version
        continue-on-error: true
        run: (Get-Item (Get-Command msedge).Source).VersionInfo.ProductVersion
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DincludeVisualTestRuntime" "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=WINDOWS" "-DtargetBrowserName=MicrosoftEdge" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${{ env.GLOBAL_TESTING_SCOPE }}"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Windows_Edge_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  MacOSX_Safari_Local:
    runs-on: macos-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Install optional visual test runtime
        run: mvn -pl shaft-visual -am -e install "-DskipTests" "-Dgpg.skip"
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DincludeVisualTestRuntime" "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=MAC" "-DtargetBrowserName=safari" "-DgenerateAllureReportArchive=true" "-Dtest=${{ env.GLOBAL_TESTING_SCOPE }}, !%regex[.*MobileEmulation.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: MacOSX_Safari_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}


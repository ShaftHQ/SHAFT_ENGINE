        with:
          job-name: Windows_Edge_Cucumber_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Ubuntu_Chrome_Moon:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MOON_NAMESPACE: moon
      MOON_RELEASE: moon
      MOON_PORT: '4444'
      MOON_URL: http://localhost:4444/wd/hub
      MOON_CHART_VERSION: ''
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Create Kubernetes Kind Cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: moon
          wait: 120s

      - name: Verify Kubernetes Cluster
        shell: bash
        run: |
          set -euo pipefail
          kubectl cluster-info
          kubectl wait --for=condition=Ready nodes --all --timeout=120s
          kubectl get nodes -o wide

      - name: Setup Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.18.4

      - name: Install Moon
        shell: bash
        run: |
          set -euo pipefail
          helm repo add aerokube https://charts.aerokube.com/
          helm repo update

          chart_args=(
            --create-namespace
            --namespace "${MOON_NAMESPACE}"
            --set deployment.replicas=1
            --set "deployment.moonCallbackURL=http://localhost:${MOON_PORT}"
          )
          if [ -n "${MOON_CHART_VERSION}" ]; then
            chart_args+=(--version "${MOON_CHART_VERSION}")
          fi

          helm upgrade --install "${MOON_RELEASE}" aerokube/moon2 "${chart_args[@]}"
          kubectl -n "${MOON_NAMESPACE}" rollout status "deployment/${MOON_RELEASE}" --timeout=5m
          kubectl -n "${MOON_NAMESPACE}" wait --for=condition=Available "deployment/${MOON_RELEASE}" --timeout=120s
          kubectl -n "${MOON_NAMESPACE}" get all -o wide

      - name: Forward Moon WebDriver Port
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${MOON_NAMESPACE}" port-forward "service/${MOON_RELEASE}" "${MOON_PORT}:${MOON_PORT}" > moon-port-forward.log 2>&1 &
          echo "$!" > moon-port-forward.pid

          for attempt in {1..60}; do
            if ! kill -0 "$(cat moon-port-forward.pid)" 2>/dev/null; then
              cat moon-port-forward.log || true
              echo "::error::Moon port-forward process exited before endpoint became available."
              exit 1
            fi
            if curl --max-time 2 -fsS "${MOON_URL%/wd/hub}/status" >/dev/null; then
              curl --max-time 2 -fsS "${MOON_URL%/wd/hub}/status"
              exit 0
            fi
            sleep 1
          done

          cat moon-port-forward.log || true
          echo "::error::Timed out waiting for Moon WebDriver status endpoint."
          exit 1

      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'

      - name: Enable JUnit Test Runtime
        shell: bash
        run: |
          mkdir -p shaft-engine/src/test/resources/META-INF/services
          rm -f shaft-engine/src/test/resources/META-INF/services/org.testng.ITestNGListener
          printf 'com.shaft.listeners.JunitListener\n' > shaft-engine/src/test/resources/META-INF/services/org.junit.platform.launcher.LauncherSessionListener

      - name: Run Moon Tests
        continue-on-error: true
        shell: bash
        run: |
          mvn -e -Pjunit -pl shaft-engine -am test \
            "-DskipTestNG=true" \
            "-DdefaultElementIdentificationTimeout=5" \
            "-DretryMaximumNumberOfAttempts=1" \
            "-DexecutionAddress=${MOON_URL}" \
            "-DtargetOperatingSystem=LINUX" \
            "-DtargetBrowserName=chrome" \
            "-DheadlessExecution=true" \
            "-DremoteServerInstanceCreationTimeout=10" \
            "-DgenerateAllureReportArchive=true" \
            "-Dtest=MoonTests"

      - name: Verify Moon Test Results Exist
        if: always()
        shell: bash
        run: |
          RESULT_COUNT=$(find shaft-engine/allure-results -name '*-result.json' -type f 2>/dev/null | wc -l | tr -d ' ')
          echo "Allure result files: ${RESULT_COUNT}"
          if [ "${RESULT_COUNT}" -lt 2 ]; then
            echo "::error::Expected MoonTests to generate at least 2 Allure result files."
            exit 1
          fi

      - name: Collect Moon Diagnostics
        if: always()
        shell: bash
        run: |
          kubectl -n "${MOON_NAMESPACE}" get all || true
          kubectl -n "${MOON_NAMESPACE}" describe "deployment/${MOON_RELEASE}" || true
          kubectl -n "${MOON_NAMESPACE}" logs "deployment/${MOON_RELEASE}" -c moon --tail=200 || true
          kubectl -n "${MOON_NAMESPACE}" logs "deployment/${MOON_RELEASE}" -c moon-conf --tail=200 || true
          kubectl -n "${MOON_NAMESPACE}" logs "deployment/${MOON_RELEASE}" -c moon-ui --tail=200 || true
          cat moon-port-forward.log || true

      - name: Stop Moon Port Forward
        if: always()
        shell: bash
        run: |
          if [ -f moon-port-forward.pid ]; then
            kill "$(cat moon-port-forward.pid)" || true
          fi

      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_Chrome_Moon
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

name: E2E Tests

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  schedule:
    - cron: '00 1 * * *'
  workflow_dispatch:

env:
  GLOBAL_TESTING_SCOPE: "!%regex[.*DatabaseActions.*], !%regex[.*CLI.*], !%regex[.*DB.*], !%regex[.*Db.*], !%regex[.*db.*], !%regex[.*API.*], !%regex[.*Api.*], !%regex[.*api.*], !%regex[.*uestBuilder.*], !%regex[.*Rest.*], !%regex[.*Json.*], !%regex[.*JSON.*], !%regex[.*json.*], !%regex[.*ndroid.*], !%regex[.*IOS.*], !%regex[.*obile.*], !%regex[.*CucumberTests.*], !%regex[.*LT.*], !%regex[.*Flutter.*]"

jobs:
  Ubuntu_Database:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Connect to PostgreSQL
        run: |
            cd src/main/resources/docker-compose/postgres/
            npm install pg
            node client.js
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*DatabaseActions.*], %regex[.*DB.*], %regex[.*Db.*], %regex[.*db.*]"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_Database
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Ubuntu_APIs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*API.*], %regex[.*Api.*], %regex[.*uestBuilder.*], %regex[.*Rest.*], %regex[.*Json.*], %regex[.*JSON.*], %regex[.*json.*]"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_APIs
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Ubuntu_Browser_Grid:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: firefox
            scale_chrome: 0
            scale_edge: 0
            scale_firefox: 10
          - browser: chrome
            scale_chrome: 10
            scale_edge: 0
            scale_firefox: 0
          - browser: MicrosoftEdge
            scale_chrome: 0
            scale_edge: 10
            scale_firefox: 0
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up Native Selenium Grid
        run: docker compose -f src/main/resources/docker-compose/selenium4.yml up --scale chrome=${{ matrix.scale_chrome }} --scale edge=${{ matrix.scale_edge }} --scale firefox=${{ matrix.scale_firefox }} -d
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Check running containers
        run: docker ps
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=DYNAMIC" "-DsetParallel=METHODS" "-DretryMaximumNumberOfAttempts=3" "-DexecutionAddress=http://localhost:4444" "-DtargetOperatingSystem=LINUX" "-DtargetBrowserName=${{ matrix.browser }}" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${GLOBAL_TESTING_SCOPE}"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_${{ matrix.browser }}_Grid
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Android_Native_BrowserStack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Run tests
        continue-on-error: true
        timeout-minutes: 40
        run: mvn -e test "-DdefaultElementIdentificationTimeout=60" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=browserstack" "-DtargetOperatingSystem=android" "-Dmobile_automationName=UIAutomator2" "-DbrowserStack.platformVersion=13.0" "-DbrowserStack.deviceName=Google Pixel 7" "-DbrowserStack.appUrl=" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*ndroid.*]"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Android_Native_BrowserStack
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  iOS_Web_SAFARI_BrowserStack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=3" "-DexecutionAddress=browserstack" "-DtargetOperatingSystem=iOS" "-Dmobile_automationName=XCuiTest" "-DbrowserStack.osVersion=16" "-DbrowserStack.deviceName=iPhone 14" "-DbrowserName=safari" "-DbrowserStack.appName=" "-DbrowserStack.appRelativeFilePath=" "-DbrowserStack.appUrl=" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*MobileWebTest.*]"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: iOS_Web_SAFARI_BrowserStack
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Android_Web_Chrome_BrowserStack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=3" "-DexecutionAddress=browserstack" "-DtargetOperatingSystem=android" "-Dmobile_automationName=UIAutomator2" "-DbrowserStack.osVersion=13.0" "-DbrowserStack.deviceName=Samsung Galaxy S23" "-DbrowserName=chrome" "-DbrowserStack.appName=" "-DbrowserStack.appRelativeFilePath=" "-DbrowserStack.appUrl=" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*MobileWebTest.*]"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Android_Web_Chrome_BrowserStack
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  MacOSX_Safari_BrowserStack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=3" "-DexecutionAddress=browserstack" "-DtargetOperatingSystem=MAC" "-DtargetBrowserName=Safari" "-DbrowserStack.os=OS X" "-DbrowserStack.osVersion=Sonoma" "-DbrowserStack.browserVersion=17.0" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*BrowserActionsTests.*], %regex[.*BigPageActionsTest.*]"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: MacOSX_Safari_BrowserStack
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Ubuntu_Chrome_Cucumber_Grid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up Native Selenium Grid
        run: docker compose -f src/main/resources/docker-compose/selenium4.yml up --scale chrome=10 --scale edge=0 --scale firefox=0 -d
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '16'
      - name: Check running containers
        run: docker ps
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=DYNAMIC" "-DsetParallel=METHODS" "-DretryMaximumNumberOfAttempts=3" "-DexecutionAddress=http://localhost:4444" "-DtargetOperatingSystem=LINUX" "-DtargetBrowserName=chrome" "-DmaximumPerformanceMode=2" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*CucumberTests.*]"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Ubuntu_Chrome_Cucumber_Grid
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  MacOSX_Safari_Cucumber_BrowserStack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '16'
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=3" "-DexecutionAddress=browserstack" "-DtargetOperatingSystem=MAC" "-DtargetBrowserName=Safari" "-DmaximumPerformanceMode=1" "-DbrowserStack.os=OS X" "-DbrowserStack.osVersion=Sonoma" "-DbrowserStack.browserVersion=17.0" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*CucumberTests.*]"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: MacOSX_Safari_Cucumber_BrowserStack
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

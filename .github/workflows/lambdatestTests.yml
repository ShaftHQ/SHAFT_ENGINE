name: LambdaTest E2E Tests

concurrency:
  group: lambdatest-e2e-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '00 1 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Workflow_Summary:
    if: always()
    needs:
      - LambdaTest_NativeAndroid
      - LambdaTest_NativeIOS
      - LambdaTest_WebApp
      - LambdaTest_DesktopWeb
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Consolidate Test Results
        uses: ./.github/actions/consolidate-test-results
        with:
          needs-json: ${{ toJSON(needs) }}

  LambdaTest_NativeAndroid:
    runs-on: ubuntu-latest
    env:
      LAMBDATEST_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
      LAMBDATEST_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
      LT_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
      LT_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: 'lts/*'
      - name: Verify LambdaTest credentials
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${LAMBDATEST_USERNAME:-}" ] || [ -z "${LAMBDATEST_ACCESS_KEY:-}" ]; then
            echo "::error::LambdaTest credentials are not configured in repository secrets."
            exit 1
          fi
          echo "::add-mask::${LAMBDATEST_USERNAME}"
          echo "::add-mask::${LAMBDATEST_ACCESS_KEY}"
          {
            echo "LT_USERNAME=${LAMBDATEST_USERNAME}"
            echo "LT_ACCESS_KEY=${LAMBDATEST_ACCESS_KEY}"
          } >> "$GITHUB_ENV"
          echo "LambdaTest credentials are configured for this job."
      - name: Upload LambdaTest Android app
        shell: bash
        run: |
          set -euo pipefail
          response_file="${RUNNER_TEMP}/lambdatest-android-app.json"
          curl --fail --silent --show-error \
            --user "${LAMBDATEST_USERNAME}:${LAMBDATEST_ACCESS_KEY}" \
            --request POST "https://manual-api.lambdatest.com/app/upload/realDevice" \
            --form "appFile=@shaft-engine/src/test/resources/testDataFiles/apps/ApiDemos-debug.apk" \
            --form "name=shaft-engine_ApiDemos-debug.apk" \
            --output "${response_file}"
          app_url=$(python3 - "${response_file}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as response:
              payload = json.load(response)
          print(payload.get("app_url", ""))
          PY
          )
          if [ -z "${app_url}" ]; then
            echo "::error::LambdaTest Android app upload did not return an app_url."
            exit 1
          fi
          echo "LAMBDATEST_ANDROID_APP_URL=${app_url}" >> "$GITHUB_ENV"
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=lambdatest" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*Test_LTMobAPK*.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: LambdaTest_NativeAndroid
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  LambdaTest_NativeIOS:
    runs-on: ubuntu-latest
    env:
      LAMBDATEST_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
      LAMBDATEST_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
      LT_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
      LT_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
    needs: [ LambdaTest_NativeAndroid ]
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: 'lts/*'
      - name: Verify LambdaTest credentials
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${LAMBDATEST_USERNAME:-}" ] || [ -z "${LAMBDATEST_ACCESS_KEY:-}" ]; then
            echo "::error::LambdaTest credentials are not configured in repository secrets."
            exit 1
          fi
          echo "::add-mask::${LAMBDATEST_USERNAME}"
          echo "::add-mask::${LAMBDATEST_ACCESS_KEY}"
          {
            echo "LT_USERNAME=${LAMBDATEST_USERNAME}"
            echo "LT_ACCESS_KEY=${LAMBDATEST_ACCESS_KEY}"
          } >> "$GITHUB_ENV"
          echo "LambdaTest credentials are configured for this job."
      - name: Upload LambdaTest iOS app
        shell: bash
        run: |
          set -euo pipefail
          response_file="${RUNNER_TEMP}/lambdatest-ios-app.json"
          curl --fail --silent --show-error \
            --user "${LAMBDATEST_USERNAME}:${LAMBDATEST_ACCESS_KEY}" \
            --request POST "https://manual-api.lambdatest.com/app/upload/realDevice" \
            --form "appFile=@shaft-engine/src/test/resources/testDataFiles/apps/BStackSampleApp.ipa" \
            --form "name=shaft-engine_BStackSampleApp.ipa" \
            --output "${response_file}"
          app_url=$(python3 - "${response_file}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as response:
              payload = json.load(response)
          print(payload.get("app_url", ""))
          PY
          )
          if [ -z "${app_url}" ]; then
            echo "::error::LambdaTest iOS app upload did not return an app_url."
            exit 1
          fi
          echo "LAMBDATEST_IOS_APP_URL=${app_url}" >> "$GITHUB_ENV"
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=lambdatest" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*Test_LTMobIPA*.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: LambdaTest_NativeIOS
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  LambdaTest_WebApp:
    runs-on: ubuntu-latest
    env:
      LAMBDATEST_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
      LAMBDATEST_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
      LT_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
      LT_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
    needs: [ LambdaTest_NativeAndroid, LambdaTest_NativeIOS ]
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: 'lts/*'
      - name: Verify LambdaTest credentials
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${LAMBDATEST_USERNAME:-}" ] || [ -z "${LAMBDATEST_ACCESS_KEY:-}" ]; then
            echo "::error::LambdaTest credentials are not configured in repository secrets."
            exit 1
          fi
          echo "::add-mask::${LAMBDATEST_USERNAME}"
          echo "::add-mask::${LAMBDATEST_ACCESS_KEY}"
          {
            echo "LT_USERNAME=${LAMBDATEST_USERNAME}"
            echo "LT_ACCESS_KEY=${LAMBDATEST_ACCESS_KEY}"
          } >> "$GITHUB_ENV"
          echo "LambdaTest credentials are configured for this job."
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=lambdatest" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*Test_LTWebApp*.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: LambdaTest_WebApp
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  LambdaTest_DesktopWeb:
    runs-on: ubuntu-latest
    env:
      LAMBDATEST_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
      LAMBDATEST_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
      LT_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
      LT_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
    needs: [ LambdaTest_NativeAndroid, LambdaTest_NativeIOS, LambdaTest_WebApp ]
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: 'lts/*'
      - name: Verify LambdaTest credentials
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${LAMBDATEST_USERNAME:-}" ] || [ -z "${LAMBDATEST_ACCESS_KEY:-}" ]; then
            echo "::error::LambdaTest credentials are not configured in repository secrets."
            exit 1
          fi
          echo "::add-mask::${LAMBDATEST_USERNAME}"
          echo "::add-mask::${LAMBDATEST_ACCESS_KEY}"
          {
            echo "LT_USERNAME=${LAMBDATEST_USERNAME}"
            echo "LT_ACCESS_KEY=${LAMBDATEST_ACCESS_KEY}"
          } >> "$GITHUB_ENV"
          echo "LambdaTest credentials are configured for this job."
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=lambdatest" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*Test_LTDesktopWeb.*], %regex[.*LambdaTestHelperUnitTest.*], %regex[.*LambdaTestSetPropertyCoverageUnitTest.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: LambdaTest_DesktopWeb
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

name: Template Coupling Gate

# shaft-engine example templates and shaft-skills content are asserted verbatim by
# shaft-mcp's ShaftProjectServiceTest (cross-module coupling). The heavyweight
# shaft-mcp workflow is deliberately nightly/manual-only (see
# scripts/ci/validate_shaft_mcp_configuration.py), so template changes previously
# reached main without ever running the coupled test (see #3728, regression
# 217c39fcc5). This lightweight gate runs exactly that test on the PRs that can
# break it.

on:
  pull_request:
    paths:
      - 'shaft-engine/src/main/resources/examples/**'
      - 'shaft-skills/**'
      - 'shaft-mcp/src/main/java/com/shaft/mcp/ShaftProjectService.java'
      - 'shaft-mcp/src/test/java/com/shaft/mcp/ShaftProjectServiceTest.java'
      - '.github/workflows/template-coupling.yml'

permissions:
  contents: read

concurrency:
  group: template-coupling-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  shaft-mcp-template-tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.12
      - name: Run template-coupled shaft-mcp tests
        run: >-
          mvn --batch-mode -pl shaft-mcp -am test
          -Dtest="ShaftProjectServiceTest"
          -Dsurefire.failIfNoSpecifiedTests=false
          -DheadlessExecution=true
          -Dgpg.skip

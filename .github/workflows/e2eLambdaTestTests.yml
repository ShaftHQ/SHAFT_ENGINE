name: E2E LambdaTest Tests

on:
  workflow_dispatch:

jobs:
  LambdaTest_NativeAndroid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '16'
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: 'maven'
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.5
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=lambdatest" -DgenerateAllureReportArchive="true" -Dtest="%regex[.*Test_LTMobAPK*.*]"
      - name: Upload coverage to Codecov
        if: always()
        uses:  codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          files: ./target/jacoco/jacoco.xml
          verbose: true
          disable_search: true
      - name: Rename Allure Report for Direct Upload
        if: always()
        run: mv allure-report/*AllureReport.html allure-report/LambdaTest_NativeAndroid_Allure.html 2>/dev/null || true
      - name: Upload Allure Report as Pipeline Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: "allure-report/LambdaTest_NativeAndroid_Allure.html"
          archive: false
      - name: Test Summary
        uses: test-summary/action@v2
        with:
          paths: "target/surefire-reports/TEST-*.xml"
        if: always()
        continue-on-error: true

name: PR Gate

# The single path-conditioned gate for this repository (issue #3814). Phase 1
# introduced it as the "PR Gate Summary" required status check; Phase 3 folded
# the per-area workflows it replicates (docs-boundary-gate.yml,
# intellij-plugin.yml, shaft-capture-e2e.yml, shaft-cli.yml,
# template-coupling.yml) into this file and deleted them, so this workflow is
# now the ONLY trigger source for those legs -- keep its path filters in sync
# with what those files used to list (see the deletion checklist in
# .github/workflows/README.md). If a merge queue is ever enabled, add
# `merge_group:` to the triggers below.
#
# Deliberately pull_request + push(main) only, no workflow_dispatch:
# dorny/paths-filter cannot resolve a diff base outside push/pull_request
# events, so a workflow_dispatch run would either always fail the changes job
# or (if gated) skip every leg and pass vacuously. The push trigger covers the
# main-branch coverage the folded workflows used to provide: on a `push` to a
# branch that is also the configured `base` (main, here), dorny/paths-filter
# diffs against the most recent commit on that branch before the push (its
# documented "long-lived branch" behavior) rather than a PR base -- see the
# dorny/paths-filter README at the pinned SHA for the exact semantics. The
# `changes` job carries no `if:`, so it always runs on both event types, and
# the `dependency-review` job's own `if: github.event_name == 'pull_request'`
# makes it report `skipped` (not a failure) on push, which the summary job's
# success|skipped leg check already accepts.

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-22.04
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      intellij: ${{ steps.filter.outputs.intellij }}
      cli: ${{ steps.filter.outputs.cli }}
      capture: ${{ steps.filter.outputs.capture }}
      templates: ${{ steps.filter.outputs.templates }}
      javacore: ${{ steps.filter.outputs.javacore }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          # Ignored on pull_request (the action always diffs against the PR
          # base there). On push, base == the triggering branch, which is the
          # documented "long-lived branch" case: diff against the most recent
          # commit on main before the push, not the repository default branch
          # merge-base search.
          base: main
          filters: |
            docs:
              - "**/*.md"
              - "**/*.mdx"
              - "scripts/ci/validate_documentation_boundaries.py"
            intellij:
              - 'shaft-intellij/**'
              - '.github/workflows/publish-intellij-plugin.yml'
              - 'scripts/mcp/**'
              - 'tests/scripts/test_install_shaft_mcp.py'
              - 'scripts/ci/verify_shaft_mcp_installer_release.py'
              - 'scripts/ci/validate_installer_contract.py'
              - 'tests/scripts/test_validate_installer_contract.py'
              - 'shaft-mcp/src/main/java/com/shaft/mcp/**'
              - 'shaft-capture/**'
              - 'shaft-skills/**'
              - 'tests/scripts/test_generate_shaft_skills_tool_catalog.py'
              - 'tests/scripts/test_mcp_tool_catalog_sync.py'
              - 'shaft-mcp/src/test/resources/fixtures/mcp-tool-manifest.json'
              - 'shaft-mcp/src/main/resources/META-INF/shaft-mcp/**'
              - 'tests/scripts/test_generate_tool_index.py'
              - 'tests/scripts/test_validate_tool_index_examples.py'
              - 'shaft-cli/src/main/java/com/shaft/commandline/command/**'
            cli:
              - 'shaft-cli/**'
              - 'pom.xml'
            capture:
              - 'shaft-capture/**'
            templates:
              - 'shaft-engine/src/main/resources/examples/**'
              - 'shaft-skills/**'
              - 'shaft-mcp/src/main/java/com/shaft/mcp/ShaftProjectService.java'
              - 'shaft-mcp/src/test/java/com/shaft/mcp/ShaftProjectServiceTest.java'
            # Core Java modules with a unit-test leg (issue #3849): shaft-engine and
            # its downstream Pilot-family modules. shaft-capture/shaft-cli/shaft-intellij
            # already have dedicated legs above and are intentionally not repeated here.
            javacore:
              - 'shaft-engine/**'
              - 'shaft-pilot-core/**'
              - 'shaft-doctor/**'
              - 'shaft-ai/**'
              - 'shaft-heal/**'
              - 'shaft-mcp/**'
              - 'pom.xml'
            infra:
              - '.github/workflows/pr-gate.yml'

  docs-boundary:
    name: Documentation Boundary Gate
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Validate documentation boundaries
        run: python3 scripts/ci/validate_documentation_boundaries.py

  # intellij-plugin.yml runs two independent PR jobs today (installer
  # verification across three OSes, and the Gradle plugin build); both are
  # replicated faithfully here rather than folded into one job.
  installer-verify:
    name: Installer verification (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.intellij == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-2025]
    steps:
      # .memory relation filenames exceed MAX_PATH with the runner workspace prefix;
      # without long paths, git checkout itself fails on Windows runners.
      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Python 3.13
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true
      - name: Run unittest for installer script
        run: python -m unittest tests.scripts.test_install_shaft_mcp tests.scripts.test_generate_shaft_skills_tool_catalog tests.scripts.test_mcp_tool_catalog_sync tests.scripts.test_generate_tool_index tests.scripts.test_validate_tool_index_examples -v
      - name: Validate installer contract
        run: python scripts/ci/validate_installer_contract.py
      - name: Verify installer release
        run: python scripts/ci/verify_shaft_mcp_installer_release.py

  intellij-build:
    name: Build IntelliJ plugin
    needs: changes
    if: needs.changes.outputs.intellij == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Build IntelliJ plugin
        uses: ./.github/actions/intellij-verify
      - name: Upload plugin distribution
        uses: actions/upload-artifact@v7
        with:
          name: shaft-intellij-plugin
          path: shaft-intellij/build/distributions/*.zip
          if-no-files-found: error

  cli:
    name: shaft-cli (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2025]
    steps:
      # .memory relation filenames exceed MAX_PATH with the runner workspace prefix;
      # without long paths, git checkout itself fails on Windows runners.
      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true
          cache: 'maven'
      - name: Test shaft-cli
        run: mvn --batch-mode -pl shaft-cli test '-DheadlessExecution=true'
      - name: Package shaft-cli and run the binary
        shell: bash
        run: |
          mvn --batch-mode -pl shaft-cli package -DskipTests '-DheadlessExecution=true' -q
          java -jar shaft-cli/target/shaft-cli-*[0-9].jar --version
          java -jar shaft-cli/target/shaft-cli-*[0-9].jar --help

  capture-e2e:
    name: SHAFT Capture Browser E2E
    needs: changes
    if: needs.changes.outputs.capture == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "zulu"
          check-latest: true
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.5
      # pr-gate has no earlier install step for this module set, unlike the
      # standalone shaft-capture-e2e.yml which is the only workflow to build
      # this leg, so the install step is carried over verbatim here.
      - name: Install SHAFT Capture prerequisites without tests
        run: >-
          mvn --batch-mode
          -pl shaft-engine,shaft-pilot-core,shaft-capture
          -am install -DskipTests -Dgpg.skip
      - name: Run headless SHAFT Capture browser E2E tests
        uses: ./.github/actions/capture-browser-e2e

  # Path-conditioned unit-test leg (issue #3849): shaft-engine and the Java
  # modules downstream of it reached main with zero PR-time test execution --
  # their tests only ran in the nightly E2E/Pilot-release workflows. Runs one
  # matrix job per module rather than N copy-pasted legs. Every module here
  # gets its dependencies installed first (mirrors capture-e2e's install-step
  # pattern above) because pr-gate has no earlier install step for this set.
  #
  # shaft-pilot-core/shaft-doctor/shaft-ai/shaft-heal/shaft-mcp run their full
  # `mvn test` suite unfiltered -- the same invocation shaft-pilot-release.yml
  # already runs on every release-relevant PR and calls "deterministic" (no
  # live browser/grid/device; the one opt-in browser suite, shaft-capture's,
  # stays gated behind -DincludeCaptureBrowserE2E and is not part of this set).
  #
  # shaft-engine cannot reuse that unfiltered pattern: outside its own
  # `testPackage.unitTests` package it also has nightly-only live-browser
  # suites (e.g. CoverageTests) that need a real driver session. This leg
  # scopes to that package, minus RestValidationsBuilderUnitTest, which calls
  # the public jsonplaceholder.typicode.com API and is a third-party-uptime
  # flake risk unrelated to this repo's own correctness.
  unit-tests:
    name: Unit Tests (${{ matrix.module }})
    needs: changes
    if: needs.changes.outputs.javacore == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        module: [ shaft-engine, shaft-pilot-core, shaft-doctor, shaft-ai, shaft-heal, shaft-mcp ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true
          cache: 'maven'
      - name: Install ${{ matrix.module }} prerequisites without tests
        run: >-
          mvn --batch-mode
          -pl ${{ matrix.module }}
          -am install -DskipTests '-DheadlessExecution=true' '-Dallure.automaticallyOpen=false' -Dgpg.skip
      - name: Run shaft-engine unit tests
        if: matrix.module == 'shaft-engine'
        run: >-
          mvn --batch-mode
          -pl shaft-engine test
          '-Dtest=testPackage/unitTests/*, !RestValidationsBuilderUnitTest'
          -Dsurefire.failIfNoSpecifiedTests=false
          '-DheadlessExecution=true' '-Dallure.automaticallyOpen=false' -Dgpg.skip
      - name: Verify shaft-engine unit test results
        # shaft-engine's testng Surefire profile sets testFailureIgnore=true
        # (so JaCoCo can still report after a failure) -- `mvn test` therefore
        # exits 0 even when tests genuinely fail. Every other module in this
        # matrix has no such override, so only shaft-engine needs this check.
        if: matrix.module == 'shaft-engine'
        run: |
          python3 -c "
          import sys, xml.etree.ElementTree as ET
          root = ET.parse('shaft-engine/target/surefire-reports/testng-results.xml').getroot()
          failed = int(root.get('failed', '0'))
          total = int(root.get('total', '0'))
          print(f'shaft-engine unit tests: total={total} failed={failed}')
          sys.exit(1 if failed else 0)
          "
      - name: Run ${{ matrix.module }} tests
        if: matrix.module != 'shaft-engine'
        run: >-
          mvn --batch-mode
          -pl ${{ matrix.module }} test
          '-DheadlessExecution=true' '-Dallure.automaticallyOpen=false' -Dgpg.skip

  template-coupling:
    name: Template Coupling Gate
    needs: changes
    if: needs.changes.outputs.templates == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.12
      - name: Run template-coupled shaft-mcp tests
        run: >-
          mvn --batch-mode -pl shaft-mcp -am test
          -Dtest="ShaftProjectServiceTest"
          -Dsurefire.failIfNoSpecifiedTests=false
          -DheadlessExecution=true
          -Dgpg.skip

  # Moved from security.yml's dependency-review job. Runs unconditionally on
  # every pull_request (no path leg matches it in the `changes` job, mirroring
  # its unconditional-per-PR behavior in security.yml today) and temporarily
  # double-runs alongside security.yml's own dependency-review job until
  # Phase 3 removes it from security.yml.
  dependency-review:
    name: Dependency Review
    needs: changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          config-file: './.github/dependency-review-config.yml'

  summary:
    name: PR Gate Summary
    needs:
      - changes
      - docs-boundary
      - installer-verify
      - intellij-build
      - cli
      - capture-e2e
      - unit-tests
      - template-coupling
      - dependency-review
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Evaluate leg results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          DOCS_RESULT: ${{ needs.docs-boundary.result }}
          INTELLIJ_VERIFY_RESULT: ${{ needs.installer-verify.result }}
          INTELLIJ_BUILD_RESULT: ${{ needs.intellij-build.result }}
          CLI_RESULT: ${{ needs.cli.result }}
          CAPTURE_RESULT: ${{ needs.capture-e2e.result }}
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          TEMPLATES_RESULT: ${{ needs.template-coupling.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
        run: |
          set -uo pipefail

          {
            echo "| Leg | Result |"
            echo "| --- | --- |"
            echo "| changes | ${CHANGES_RESULT} |"
            echo "| docs-boundary | ${DOCS_RESULT} |"
            echo "| installer-verify | ${INTELLIJ_VERIFY_RESULT} |"
            echo "| intellij-build | ${INTELLIJ_BUILD_RESULT} |"
            echo "| cli | ${CLI_RESULT} |"
            echo "| capture-e2e | ${CAPTURE_RESULT} |"
            echo "| unit-tests | ${UNIT_TESTS_RESULT} |"
            echo "| template-coupling | ${TEMPLATES_RESULT} |"
            echo "| dependency-review | ${DEPENDENCY_REVIEW_RESULT} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${CHANGES_RESULT}" != "success" ]; then
            echo "::error::changes job did not succeed (${CHANGES_RESULT})"
            exit 1
          fi

          status=0
          for result in "${DOCS_RESULT}" "${INTELLIJ_VERIFY_RESULT}" "${INTELLIJ_BUILD_RESULT}" "${CLI_RESULT}" "${CAPTURE_RESULT}" "${UNIT_TESTS_RESULT}" "${TEMPLATES_RESULT}" "${DEPENDENCY_REVIEW_RESULT}"; do
            case "$result" in
              success|skipped) ;;
              *)
                echo "::error::a required leg did not pass (result: ${result})"
                status=1
                ;;
            esac
          done

          exit "$status"

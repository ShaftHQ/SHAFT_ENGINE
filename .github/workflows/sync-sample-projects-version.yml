name: Sync Sample Projects SHAFT Version

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'SHAFT Engine version to sync (leave empty to use latest release)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-versions:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Determine SHAFT Version
        id: get-version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            # Manual workflow dispatch with specific version
            VERSION="${{ github.event.inputs.version }}"
            echo "Using manually specified version: $VERSION"
          elif [ "${{ github.event_name }}" == "release" ]; then
            # Triggered by release event
            VERSION="${{ github.event.release.tag_name }}"
            echo "Using release tag version: $VERSION"
          else
            # Fallback to pom.xml version (extract the project version from the top-level POM)
            # Use sed to extract version from the first occurrence in the POM header (not from dependencies)
            VERSION=$(sed -n '/<groupId>io.github.shafthq<\/groupId>/,/<\/properties>/{ /<version>/{ s/.*<version>\(.*\)<\/version>.*/\1/p; q; } }' pom.xml | tr -d ' ')
            echo "Using version from pom.xml: $VERSION"
          fi

          echo "NEW_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Determined SHAFT version: $VERSION"

      - name: Extract Canonical Versions from Main pom.xml
        id: extract-versions
        run: |
          # Extract the canonical version for each tracked property from the main pom.xml.
          # These values are used to keep all sample project pom.xml files in sync.

          extract_version() {
            local tag="$1"
            grep -m1 "<${tag}>" pom.xml | sed "s/.*<${tag}>\(.*\)<\/${tag}>.*/\1/" | tr -d ' '
          }

          extract_plugin_version() {
            local artifactId="$1"
            # Extract the <version> that immediately follows the <artifactId> tag in pom.xml
            grep -A1 "<artifactId>${artifactId}</artifactId>" pom.xml | grep '<version>' | head -1 | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d ' '
          }

          # JDK version: read from maven-compiler-plugin <source> configuration
          JDK_VERSION=$(grep -A10 '<artifactId>maven-compiler-plugin</artifactId>' pom.xml | grep '<source>' | head -1 | sed 's/.*<source>\(.*\)<\/source>.*/\1/' | tr -d ' ')

          ASPECTJWEAVER_VERSION=$(grep -A2 '<artifactId>aspectjweaver</artifactId>' pom.xml | grep '<version>' | head -1 | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d ' ')
          COMPILER_PLUGIN_VERSION=$(extract_plugin_version "maven-compiler-plugin")
          RESOURCES_PLUGIN_VERSION=$(extract_plugin_version "maven-resources-plugin")
          SUREFIRE_PLUGIN_VERSION=$(extract_plugin_version "maven-surefire-plugin")
          SUREFIRE_TESTNG_VERSION=$(grep -A2 '<artifactId>surefire-testng</artifactId>' pom.xml | grep '<version>' | head -1 | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d ' ')

          echo "JDK_VERSION=$JDK_VERSION" >> $GITHUB_OUTPUT
          echo "ASPECTJWEAVER_VERSION=$ASPECTJWEAVER_VERSION" >> $GITHUB_OUTPUT
          echo "COMPILER_PLUGIN_VERSION=$COMPILER_PLUGIN_VERSION" >> $GITHUB_OUTPUT
          echo "RESOURCES_PLUGIN_VERSION=$RESOURCES_PLUGIN_VERSION" >> $GITHUB_OUTPUT
          echo "SUREFIRE_PLUGIN_VERSION=$SUREFIRE_PLUGIN_VERSION" >> $GITHUB_OUTPUT
          echo "SUREFIRE_TESTNG_VERSION=$SUREFIRE_TESTNG_VERSION" >> $GITHUB_OUTPUT

          echo "Canonical versions extracted from main pom.xml:"
          echo "  jdk.version             = $JDK_VERSION"
          echo "  aspectjweaver.version   = $ASPECTJWEAVER_VERSION"
          echo "  maven-compiler-plugin   = $COMPILER_PLUGIN_VERSION"
          echo "  maven-resources-plugin  = $RESOURCES_PLUGIN_VERSION"
          echo "  maven-surefire-plugin   = $SUREFIRE_PLUGIN_VERSION"
          echo "  surefire-testng         = $SUREFIRE_TESTNG_VERSION"

      - name: Check Current Versions in Examples
        id: check-current
        run: |
          # Get unique shaft_engine versions from example pom.xml files
          CURRENT_VERSIONS=$(find src/main/resources/examples -name "pom.xml" -exec grep -h '<shaft_engine.version>' {} \; | sed 's/.*<shaft_engine.version>\(.*\)<\/shaft_engine.version>.*/\1/' | tr -d ' ' | sort -u | tr '\n' ' ')
          echo "CURRENT_VERSIONS=$CURRENT_VERSIONS" >> $GITHUB_OUTPUT
          echo "Current SHAFT versions in examples: $CURRENT_VERSIONS"

      - name: Update Sample Project pom.xml Files
        id: update-files
        run: |
          NEW_VERSION="${{ steps.get-version.outputs.NEW_VERSION }}"
          NEW_JDK="${{ steps.extract-versions.outputs.JDK_VERSION }}"
          NEW_ASPECTJ="${{ steps.extract-versions.outputs.ASPECTJWEAVER_VERSION }}"
          NEW_COMPILER="${{ steps.extract-versions.outputs.COMPILER_PLUGIN_VERSION }}"
          NEW_RESOURCES="${{ steps.extract-versions.outputs.RESOURCES_PLUGIN_VERSION }}"
          NEW_SUREFIRE="${{ steps.extract-versions.outputs.SUREFIRE_PLUGIN_VERSION }}"
          NEW_SUREFIRE_TESTNG="${{ steps.extract-versions.outputs.SUREFIRE_TESTNG_VERSION }}"

          echo "Syncing all versioned properties to sample projects..."
          echo "  shaft_engine.version          = $NEW_VERSION"
          echo "  jdk.version                   = $NEW_JDK"
          echo "  aspectjweaver.version         = $NEW_ASPECTJ"
          echo "  maven-compiler-plugin.version = $NEW_COMPILER"
          echo "  maven-resources-plugin.version= $NEW_RESOURCES"
          echo "  maven-surefire-plugin.version = $NEW_SUREFIRE"
          echo "  surefire-testng.version       = $NEW_SUREFIRE_TESTNG"

          # Helper: safely replace a property value in a pom.xml file
          update_property() {
            local file="$1"
            local prop="$2"
            local new_val="$3"
            local old_val
            old_val=$(grep "<${prop}>" "$file" | head -1 | sed "s/.*<${prop}>\(.*\)<\/${prop}>.*/\1/" | tr -d ' ')
            if [ -n "$old_val" ] && [ "$old_val" != "$new_val" ]; then
              local esc_old esc_new
              esc_old=$(printf '%s\n' "$old_val" | sed 's/[.[\^$*+?(){|}-]/\\&/g')
              esc_new=$(printf '%s\n' "$new_val" | sed 's/[.[\^$*+?(){|}-]/\\&/g')
              sed -i "s|<${prop}>${esc_old}</${prop}>|<${prop}>${esc_new}</${prop}>|g" "$file"
              echo "  Updated ${prop}: $old_val -> $new_val in $file"
              return 0  # change made
            fi
            return 1  # no change
          }

          CHANGES_MADE=false
          FILES_UPDATED=()

          for POM_FILE in $(find src/main/resources/examples -name "pom.xml"); do
            FILE_CHANGED=false

            update_property "$POM_FILE" "shaft_engine.version" "$NEW_VERSION" && FILE_CHANGED=true
            [ -n "$NEW_JDK" ] && update_property "$POM_FILE" "jdk.version" "$NEW_JDK" && FILE_CHANGED=true
            [ -n "$NEW_ASPECTJ" ] && update_property "$POM_FILE" "aspectjweaver.version" "$NEW_ASPECTJ" && FILE_CHANGED=true
            [ -n "$NEW_COMPILER" ] && update_property "$POM_FILE" "maven-compiler-plugin.version" "$NEW_COMPILER" && FILE_CHANGED=true
            [ -n "$NEW_RESOURCES" ] && update_property "$POM_FILE" "maven-resources-plugin.version" "$NEW_RESOURCES" && FILE_CHANGED=true
            [ -n "$NEW_SUREFIRE" ] && update_property "$POM_FILE" "maven-surefire-plugin.version" "$NEW_SUREFIRE" && FILE_CHANGED=true
            [ -n "$NEW_SUREFIRE_TESTNG" ] && update_property "$POM_FILE" "surefire-testng.version" "$NEW_SUREFIRE_TESTNG" && FILE_CHANGED=true

            if [ "$FILE_CHANGED" = true ]; then
              CHANGES_MADE=true
              FILES_UPDATED+=("- $POM_FILE")
            else
              echo "Skipping $POM_FILE - already in sync"
            fi
          done

          if [ "$CHANGES_MADE" = true ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "files_updated<<EOF" >> $GITHUB_OUTPUT
            printf '%s\n' "${FILES_UPDATED[@]}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "Changes were made to sample projects"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes needed - all examples are already in sync"
          fi

      - name: Create Pull Request
        if: steps.update-files.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Sync sample projects to SHAFT Engine ${{ steps.get-version.outputs.NEW_VERSION }}

            Updated all example pom.xml files to use SHAFT_ENGINE ${{ steps.get-version.outputs.NEW_VERSION }}
            and synced all plugin/dependency versions with the main pom.xml.
          branch: auto-update-sample-projects-version
          delete-branch: true
          title: 'Sync sample projects to SHAFT Engine ${{ steps.get-version.outputs.NEW_VERSION }}'
          body: |
            ## 🤖 Automated Sample Projects Version Sync

            This PR automatically keeps all sample project `pom.xml` files in sync with the main `pom.xml`.

            ### Version Update:

            **New SHAFT_ENGINE Version:** `${{ steps.get-version.outputs.NEW_VERSION }}`

            **Previous Versions:** `${{ steps.check-current.outputs.CURRENT_VERSIONS }}`

            ### Properties Synced:

            | Property | New Value |
            |---|---|
            | `shaft_engine.version` | `${{ steps.get-version.outputs.NEW_VERSION }}` |
            | `jdk.version` | `${{ steps.extract-versions.outputs.JDK_VERSION }}` |
            | `aspectjweaver.version` | `${{ steps.extract-versions.outputs.ASPECTJWEAVER_VERSION }}` |
            | `maven-compiler-plugin.version` | `${{ steps.extract-versions.outputs.COMPILER_PLUGIN_VERSION }}` |
            | `maven-resources-plugin.version` | `${{ steps.extract-versions.outputs.RESOURCES_PLUGIN_VERSION }}` |
            | `maven-surefire-plugin.version` | `${{ steps.extract-versions.outputs.SUREFIRE_PLUGIN_VERSION }}` |
            | `surefire-testng.version` | `${{ steps.extract-versions.outputs.SUREFIRE_TESTNG_VERSION }}` |

            ### Files Updated:
            ${{ steps.update-files.outputs.files_updated }}

            ### 📁 Sample Projects Locations:
            - `src/main/resources/examples/TestNG/`
            - `src/main/resources/examples/JUnit/`
            - `src/main/resources/examples/Cucumber/`

            ### 📋 Trigger:
            - ${{ github.event_name == 'release' && format('Triggered by release: {0}', github.event.release.tag_name) || (github.event.inputs.version != '' && format('Manually triggered with version: {0}', github.event.inputs.version) || 'Manually triggered workflow') }}

            Please review and merge if the changes look correct.
          labels: |
            dependencies
            automated
            examples

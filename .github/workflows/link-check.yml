name: Broken Links Audit

on:
  schedule:
    # Runs every Monday at 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Check Links in Markdown Files
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Check all Markdown files in docs/, root, and .github templates
          args: >
            --verbose
            --no-progress
            --timeout 30
            --max-retries 3
            --accept 200,429
            --exclude-path node_modules
            --exclude-path target
            --exclude-path .git
            --exclude 'localhost'
            --exclude 'http://www.w3.org'
            --exclude 'mailto:'
            --exclude 'https://img.shields.io'
            --exclude 'https://join.slack.com'
            docs/
            README.md
            CONTRIBUTING.md
            SECURITY.md
            CODE_OF_CONDUCT.md
            .github/RELEASE_BODY_TEMPLATE.md
            .github/pull_request_template.md
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or Update Issue for Broken Links
        if: steps.lychee.outputs.exit_code != '0'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const title = '🔗 Broken Links Detected in Documentation';
            const labels = ['documentation', 'automated', 'broken-links'];
            const reportBody = fs.readFileSync('./lychee/out.md', 'utf8');

            const { owner, repo } = context.repo;

            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 100
            });

            const existingIssue = existingIssues.find((issue) =>
              issue.title === title &&
              labels.every((label) => issue.labels.some((issueLabel) => issueLabel.name === label))
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingIssue.number,
                body: `A scheduled link audit detected broken links again. Latest report:\n\n${reportBody}`
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: reportBody,
                labels
              });
            }

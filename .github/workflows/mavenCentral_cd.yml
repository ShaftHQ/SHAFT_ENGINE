name: Maven Central Continuous Delivery
# Executed automatically when a new PR is merged to master, if the release number already exists this job will fail
# This pipeline will build from main, upload the artifacts, and create the GitHub release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_release_and_deliver:
    # Maven Central + GPG/OSSRH secrets are not available on forked repos; signing would fail with empty key id.
    if: github.event.repository.fork == false
    env:
      gpg.keyname: ${{ secrets.GPG_KEYNAME }}
      gpg.passphrase: ${{ secrets.GPG_PASSPHRASE }}
      MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # if you have a protection rule on your repository, you'll need to give write permission to the workflow.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.5
      # Captures the engine version from the pom.xml
      - name: Set Release Version Number
        run: |
          echo "RELEASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      # Inject the release version into the body template so upgrade snippets are ready-to-copy
      - name: Prepare Release Body
        run: sed "s/\$RELEASE_VERSION/${{ env.RELEASE_VERSION }}/g" .github/RELEASE_BODY_TEMPLATE.md > /tmp/release_body.md
      # Attempt to create a GitHub release using the version in the pom.xml, if this release already exists, this job will fail fast
      - name: Create GitHub Release
        id: create_release
        uses: ncipollo/release-action@v1.21.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          allowUpdates: false
          generateReleaseNotes: true
          bodyFile: /tmp/release_body.md
          name: ${{ env.RELEASE_VERSION }}
          tag: ${{ env.RELEASE_VERSION }}
      - name: Notify User Guide Repository
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.BOT_TOKEN }}
          repository: ShaftHQ/shafthq.github.io
          event-type: shaft-engine-release
          client-payload: '{"tag_name": "${{ env.RELEASE_VERSION }}", "version": "${{ env.RELEASE_VERSION }}", "release_url": "${{ steps.create_release.outputs.html_url }}"}'
      - name: Resolve Release Blog Post Link
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          python <<'PY'
          import json
          import os
          import time
          import urllib.request

          token = os.environ["BOT_TOKEN"]
          version = os.environ["RELEASE_VERSION"]
          fallback_url = f"https://github.com/ShaftHQ/shafthq.github.io/pulls?q=is%3Apr+is%3Aopen+{version}"
          blog_post_url = fallback_url
          blog_post_link_label = "Release Blog Post Search"
          api_url = "https://api.github.com/repos/ShaftHQ/shafthq.github.io/pulls?state=open&per_page=100&sort=updated&direction=desc"
          max_poll_attempts = 12
          poll_interval_seconds = 10

          for attempt in range(max_poll_attempts):
              try:
                  request = urllib.request.Request(
                      api_url,
                      headers={
                          "Authorization": f"Bearer {token}",
                          "Accept": "application/vnd.github+json",
                          "X-GitHub-Api-Version": "2022-11-28",
                          "User-Agent": "shaft-release-workflow",
                      },
                  )
                  with urllib.request.urlopen(request, timeout=20) as response:
                      pull_requests = json.load(response)
              except Exception as error:
                  if attempt + 1 < max_poll_attempts:
                      print(f"Failed to query release blog post prs on attempt {attempt + 1}/{max_poll_attempts}: {error}. Retrying...")
                  else:
                      print(f"Failed to query release blog post prs on attempt {attempt + 1}/{max_poll_attempts}: {error}. Falling back to search URL.")
                  time.sleep(poll_interval_seconds)
                  continue

              matched_pull_request = None
              for pull_request in pull_requests:
                  title = pull_request.get("title", "")
                  body = pull_request.get("body", "") or ""
                  head_reference = pull_request.get("head", {}).get("ref", "")
                  author = pull_request.get("user", {}).get("login", "")
                  title_lower = title.lower()
                  searchable_text = f"{title} {head_reference} {body}"
                  if version in searchable_text and author == "github-actions[bot]" and ("release" in title_lower or "blog" in title_lower):
                      matched_pull_request = pull_request
                      break

              if matched_pull_request:
                  blog_post_url = matched_pull_request["html_url"]
                  blog_post_link_label = "Release Blog Post PR"
                  break

              if attempt + 1 < max_poll_attempts:
                  print(f"Blog post PR not found yet for {version} (attempt {attempt + 1}/{max_poll_attempts}). Retrying...")
              else:
                  print(f"Blog post PR not found for {version} after {max_poll_attempts} attempts. Falling back to search URL.")
              time.sleep(poll_interval_seconds)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as github_env:
              github_env.write(f"BLOG_POST_URL={blog_post_url}\n")
              github_env.write(f"BLOG_POST_LINK_LABEL={blog_post_link_label}\n")

          print(f"Resolved BLOG_POST_URL={blog_post_url} ({blog_post_link_label})")
          PY
      - name: Announce Release on Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          RELEASE_URL: ${{ steps.create_release.outputs.html_url }}
          BLOG_POST_URL: ${{ env.BLOG_POST_URL }}
          BLOG_POST_LINK_LABEL: ${{ env.BLOG_POST_LINK_LABEL }}
        run: |
          python <<'PY'
          import json
          import os
          import urllib.request
          import urllib.error

          webhook = os.environ.get("SLACK_WEBHOOK_URL", "")
          if not webhook:
              print("SLACK_WEBHOOK_URL is not configured; skipping Slack announcement.")
              raise SystemExit(0)

          payload = {
              "text": f"🚀 SHAFT Engine {os.environ['RELEASE_VERSION']} is now released!\n• GitHub Release: {os.environ['RELEASE_URL']}\n• {os.environ['BLOG_POST_LINK_LABEL']}: {os.environ['BLOG_POST_URL']}"
          }
          request = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=20) as response:
                  response.read()
                  print(f"Slack webhook accepted with status {response.status}.")
          except urllib.error.HTTPError as error:
              response_body = error.read().decode("utf-8", errors="replace")
              raise RuntimeError(f"Slack webhook returned status {error.code}: {response_body}") from error
          PY
      - name: Setup Prerequisites
        run: |
          git config --global user.signingKey "${{ secrets.GPG_KEYNAME }}"
          git config --global commit.gpgsign true
          gpg --version
          gpgconf --kill gpg-agent
          gpg -K --keyid-format SHORT
          export GPG_TTY=$(tty)
      - name: Deploy to maven central
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: mvn --batch-mode deploy "-DskipTests" "-Dgpg.keyname=${{secrets.GPG_KEYNAME}}" "-Dgpg.passphrase=${{secrets.GPG_PASSPHRASE}}"

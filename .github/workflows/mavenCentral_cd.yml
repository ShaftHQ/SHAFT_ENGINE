name: Maven Central Continuous Delivery
# Executed automatically when a new PR is merged to main.
# Already-published immutable Maven Central versions skip delivery cleanly (see check_release_needed)
# instead of failing, since most pushes to main land between releases with nothing new to deliver.
# build_release_and_deliver's build/test/package steps are MIRRORED in shaft-pilot-release.yml's
# release-candidate job (PR gate vs. real release execution of the same steps) - keep both in sync.

on:
  push:
    branches: [ main ]
    paths:
      - 'pom.xml'
      - '*/pom.xml'
      - 'shaft-engine/**'
      - 'shaft-pilot-core/**'
      - 'shaft-capture/**'
      - 'shaft-doctor/**'
      - 'shaft-ai/**'
      - 'shaft-heal/**'
      - 'shaft-mcp/**'
      - 'shaft-browserstack/**'
      - 'shaft-video/**'
      - 'shaft-visual/**'
      - 'shaft-sikulix/**'
      - 'shaft-bom/**'
      - 'legacy-shaft-engine/**'
      - 'report-aggregate/**'
      - 'tools/modularization/consumer-fixtures/**'
      - '.github/RELEASE_BODY_TEMPLATE.md'
      - '.github/actions/upload-jacoco-coverage/action.yml'
      - '.github/actions/reclaim-disk-space/action.yml'
      - '.github/workflows/mavenCentral_cd.yml'
      - 'shaft-capture-proxy/**'
      - 'shaft-intellij/**'
      - 'scripts/ci/check_maven_release_version.py'
      - 'scripts/ci/validate_reactor_versions.py'
      - 'scripts/ci/validate_modular_documentation.py'
      - 'scripts/ci/validate_documentation_boundaries.py'
      - 'scripts/ci/validate_shaft_mcp_configuration.py'
      - 'scripts/ci/validate_shaft_pilot_release.py'
      - 'scripts/ci/validate_maven_publication.py'
      - 'scripts/ci/validate_shaft_mcp_transports.py'
      - 'scripts/ci/verify_maven_central_release.py'
      - 'scripts/ci/verify_shaft_mcp_installer_release.py'
      - 'scripts/mcp/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: maven-central-cd
  cancel-in-progress: false

jobs:
  check_release_needed:
    name: Check Maven Central release status
    # Maven Central + GPG/OSSRH secrets are not available on forked repos; signing would fail with empty key id.
    if: github.event.repository.fork == false
    runs-on: ubuntu-22.04
    outputs:
      already_released: ${{ steps.guard.outputs.already_released }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Reject existing Maven Central release version
        id: guard
        run: python3 scripts/ci/check_maven_release_version.py --github-output "$GITHUB_OUTPUT"

  build_release_and_deliver:
    needs: check_release_needed
    # Nothing to deliver when this reactor version is already published; see check_release_needed.
    if: github.event.repository.fork == false && needs.check_release_needed.outputs.already_released != 'true'
    env:
      gpg.keyname: ${{ secrets.GPG_KEYNAME }}
      gpg.passphrase: ${{ secrets.GPG_PASSPHRASE }}
      MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read  # only builds/tests/deploys to Maven Central; the GitHub Release is created by announce_release.
    outputs:
      release_version: ${{ steps.release_version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Reclaim disk space
        uses: ./.github/actions/reclaim-disk-space
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Set up JDK 17 for IntelliJ plugin
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'zulu'
          check-latest: true
      - name: Set up Gradle 9
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.0.0'
      - name: Verify IntelliJ plugin release candidate
        run: gradle -p shaft-intellij check buildPlugin verifyPlugin
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5.1
        with:
          maven-version: 3.9.12
      - name: Reject divergent SHAFT reactor versions
        run: python3 scripts/ci/validate_reactor_versions.py
      # Read the canonical release version from the reactor parent.
      - name: Set Release Version Number
        id: release_version
        run: |
          echo "RELEASE_VERSION=$(mvn -f pom.xml help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_ENV"
          echo "version=$(mvn -f pom.xml help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"
      - name: Validate SHAFT Pilot release contract
        run: |
          python3 scripts/ci/validate_modular_documentation.py
          python3 scripts/ci/validate_documentation_boundaries.py
          python3 scripts/ci/validate_shaft_mcp_configuration.py
          python3 scripts/ci/validate_shaft_pilot_release.py
      - name: Install SHAFT Pilot prerequisites without tests
        run: >-
          mvn --batch-mode
          -pl shaft-engine,shaft-pilot-core,shaft-capture,shaft-doctor,shaft-ai,shaft-heal,shaft-mcp
          -am install -DskipTests -Dgpg.skip
      - name: Reset Pilot Allure result contents
        run: |
          for module in shaft-pilot-core shaft-capture shaft-doctor shaft-ai shaft-heal shaft-mcp; do
            mkdir -p "${module}/allure-results"
            find "${module}/allure-results" -mindepth 1 -delete
          done
      - name: Run deterministic SHAFT Pilot tests
        id: pilot_tests
        run: >-
          mvn --batch-mode
          -pl shaft-pilot-core,shaft-capture,shaft-doctor,shaft-ai,shaft-heal,shaft-mcp
          test -Dgpg.skip
      - name: Verify populated Pilot Allure results
        run: python3 scripts/ci/validate_shaft_pilot_release.py --check-test-results
      - name: Run headless SHAFT Capture release journey
        run: >-
          mvn --batch-mode
          -pl shaft-capture test
          -DincludeCaptureBrowserE2E
          -Dtest=ManagedCaptureRecorderBrowserTest,CaptureGeneratedReplayBrowserTest
          -Dgpg.skip
      - name: Upload coverage to Codecov
        # Skip when the Pilot test step never ran (e.g. an earlier build/verify step
        # failed first) so a broken build doesn't also report a fabricated coverage failure.
        if: always() && steps.pilot_tests.outcome != 'skipped'
        uses: ./.github/actions/upload-jacoco-coverage
        with:
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          required-files: >-
            ./shaft-pilot-core/target/jacoco/jacoco.xml,
            ./shaft-capture/target/jacoco/jacoco.xml,
            ./shaft-doctor/target/jacoco/jacoco.xml,
            ./shaft-ai/target/jacoco/jacoco.xml,
            ./shaft-heal/target/jacoco/jacoco.xml,
            ./shaft-mcp/target/jacoco/jacoco.xml
      - name: Validate Maven publication
        run: |
          python3 scripts/ci/validate_maven_publication.py
          mvn --batch-mode clean install -DskipTests -Dgpg.skip
          mvn --batch-mode -pl shaft-mcp dependency:copy-dependencies -DincludeScope=runtime '-DoutputDirectory=${maven.multiModuleProjectDirectory}/shaft-mcp/target/dependency' -DskipTests -Dgpg.skip
          python3 scripts/ci/validate_maven_publication.py --check-build-outputs
          python3 scripts/ci/validate_shaft_pilot_release.py --check-build-outputs
          python3 scripts/ci/validate_shaft_mcp_transports.py
          mvn --batch-mode -f tools/modularization/consumer-fixtures/pilot-core/pom.xml verify \
            "-Dshaft.version=${RELEASE_VERSION}"
          mvn --batch-mode -f tools/modularization/consumer-fixtures/combined-modules/pom.xml verify \
            "-Dshaft.version=${RELEASE_VERSION}"
          mvn --batch-mode -f tools/modularization/consumer-fixtures/mcp/pom.xml verify \
            "-Dshaft.version=${RELEASE_VERSION}"
      - name: Reclaim disk space before container build
        uses: ./.github/actions/reclaim-disk-space
        with:
          prune-build-outputs: 'true'
      - name: Build and smoke shaft-mcp container
        uses: ./.github/actions/mcp-container-smoke
        with:
          image-tag: shaft-pilot-release:test
          container-name: shaft-pilot-release-smoke
          client-name: release-smoke
      - name: Setup Prerequisites
        run: |
          git config --global user.signingKey "${{ secrets.GPG_KEYNAME }}"
          git config --global commit.gpgsign true
          gpg --version
          gpgconf --kill gpg-agent
          gpg -K --keyid-format SHORT
          export GPG_TTY=$(tty)
      - name: Deploy to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: mvn --batch-mode deploy "-DskipTests" "-Dgpg.keyname=${{secrets.GPG_KEYNAME}}" "-Dgpg.passphrase=${{secrets.GPG_PASSPHRASE}}"
      - name: Verify published Maven Central coordinates
        run: python3 scripts/ci/verify_maven_central_release.py "${RELEASE_VERSION}"

  verify_public_shaft_mcp_installer:
    name: Verify public shaft-mcp installer (${{ matrix.os }})
    needs: build_release_and_deliver
    # Skip when build_release_and_deliver was skipped (nothing new delivered), not just on failure.
    if: needs.build_release_and_deliver.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, windows-2025]
    steps:
      # .memory relation filenames exceed MAX_PATH with the runner workspace prefix;
      # without long paths, git checkout itself fails on Windows runners.
      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
      - name: Checkout released source
        uses: actions/checkout@v7
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true
      - name: Run the public LATEST installer twice
        run: python scripts/ci/verify_shaft_mcp_installer_release.py

  announce_release:
    name: Announce verified release
    needs: [build_release_and_deliver, verify_public_shaft_mcp_installer]
    # Skip when build_release_and_deliver was skipped (nothing new delivered), not just on failure.
    if: needs.build_release_and_deliver.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout released source
        uses: actions/checkout@v7
      - name: Prepare Release Body
        env:
          RELEASE_VERSION: ${{ needs.build_release_and_deliver.outputs.release_version }}
        run: sed "s/\$RELEASE_VERSION/${RELEASE_VERSION}/g" .github/RELEASE_BODY_TEMPLATE.md > /tmp/release_body.md
      - name: Create GitHub Release
        id: create_release
        uses: ncipollo/release-action@v1.21.0
        with:
          # A release created with the default GITHUB_TOKEN does not emit a `release`
          # event (GitHub's anti-recursion rule), so publish-intellij-plugin.yml and
          # publish-shaft-mcp.yml — which both listen for `release: published` — would
          # never fire. BOT_TOKEN is a PAT, so its release does trigger those workflows.
          token: ${{ secrets.BOT_TOKEN }}
          allowUpdates: false
          generateReleaseNotes: true
          bodyFile: /tmp/release_body.md
          name: ${{ needs.build_release_and_deliver.outputs.release_version }}
          tag: ${{ needs.build_release_and_deliver.outputs.release_version }}
      - name: Notify User Guide Repository
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.BOT_TOKEN }}
          repository: ShaftHQ/shafthq.github.io
          event-type: shaft-engine-release
          client-payload: '{"tag_name": "${{ needs.build_release_and_deliver.outputs.release_version }}", "version": "${{ needs.build_release_and_deliver.outputs.release_version }}", "release_url": "${{ steps.create_release.outputs.html_url }}"}'
      - name: Announce Release on Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELEASE_VERSION: ${{ needs.build_release_and_deliver.outputs.release_version }}
          RELEASE_URL: ${{ steps.create_release.outputs.html_url }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not configured; skipping Slack release announcement."
            exit 0
          fi

          python3 - <<'PY' > /tmp/slack_release_payload.json
          import json
          import os

          version = os.environ["RELEASE_VERSION"]
          release_url = os.environ["RELEASE_URL"]
          summary = (
              f"SHAFT_ENGINE {version} is now available. The release notes are intentionally "
              "minimal and highlight only major new features, breaking changes, and new contributors."
          )
          payload = {
              "text": f"SHAFT_ENGINE {version} released: {release_url}",
              "blocks": [
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f":tada: *SHAFT_ENGINE {version}* is now available!",
                      },
                  },
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": summary},
                  },
                  {
                      "type": "actions",
                      "elements": [
                          {
                              "type": "button",
                              "text": {"type": "plain_text", "text": "View release notes"},
                              "url": release_url,
                          }
                      ],
                  },
              ],
          }
          print(json.dumps(payload))
          PY
          curl --fail --silent --show-error \
            --request POST \
            --header 'Content-type: application/json' \
            --data @/tmp/slack_release_payload.json \
            "$SLACK_WEBHOOK_URL"

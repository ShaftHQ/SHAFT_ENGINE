name: Code Quality Scan

on:
  schedule:
    # Runs every Sunday at 06:00 UTC — weekly quality gate
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  quality-scan:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.5

      - name: Compile
        run: mvn clean compile -DskipTests -Dgpg.skip -q

      - name: Check for Dependency Updates
        id: dep-updates
        run: |
          mvn versions:display-dependency-updates -Dgpg.skip 2>&1 | tee /tmp/dep-updates-raw.txt || true
          mvn versions:display-plugin-updates -Dgpg.skip 2>&1 | tee -a /tmp/dep-updates-raw.txt || true

          # Capture only stable updates (numeric X.Y or X.Y.Z without pre-release identifiers)
          UPDATES=$(grep -E "^\[INFO\].*->.*[0-9]+\.[0-9]+" /tmp/dep-updates-raw.txt \
            | grep -v -iE "alpha|beta|rc|milestone|snapshot|cr|m[0-9]" \
            | head -40 || true)

          if [ -n "$UPDATES" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            # Write a clean, formatted summary file for the issue body
            {
              echo "## 📦 Stable Dependency Updates Available"
              echo ""
              echo "The following dependencies have newer **stable** versions available."
              echo "Pre-release (alpha, beta, RC, milestone, snapshot) versions are excluded."
              echo ""
              echo '```'
              echo "$UPDATES"
              echo '```'
              echo ""
              echo "_Triggered by the weekly Code Quality Scan workflow._"
            } > /tmp/dep-updates.txt
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "No stable dependency updates found."
          fi

      - name: Verify Sample Projects Compile
        run: |
          set -o pipefail
          VALIDATION_FAILED=false
          FAILED_POMS=""

          while IFS= read -r -d '' POM; do
            DIR=$(dirname "$POM")
            echo "Checking $DIR ..."
            # Validate pom.xml structure only (no actual compile — engine not in local repo)
            if ! mvn validate -f "$POM" -q 2>&1 | tail -5; then
              VALIDATION_FAILED=true
              FAILED_POMS="${FAILED_POMS}\n- $POM"
            fi
          done < <(find src/main/resources/examples -name "pom.xml" -print0)

          if [ "$VALIDATION_FAILED" = true ]; then
            echo "Sample project validation failed for the following pom.xml files:"
            printf "%b\n" "$FAILED_POMS"
            exit 1
          fi

      - name: Check Sample Projects Version Drift
        id: version-drift
        run: |
          MAIN_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout 2>/dev/null)
          DRIFT_FOUND=false
          DRIFT_DETAILS=""

          for POM in $(find src/main/resources/examples -name "pom.xml"); do
            SAMPLE_VERSION=$(grep '<shaft_engine.version>' "$POM" | head -1 | sed 's/.*<shaft_engine.version>\(.*\)<\/shaft_engine.version>.*/\1/' | tr -d ' ')
            if [ -n "$SAMPLE_VERSION" ] && [ "$SAMPLE_VERSION" != "$MAIN_VERSION" ]; then
              DRIFT_FOUND=true
              DRIFT_DETAILS="$DRIFT_DETAILS\n- $POM: $SAMPLE_VERSION (expected $MAIN_VERSION)"
            fi
          done

          if [ "$DRIFT_FOUND" = true ]; then
            echo "drift=true" >> $GITHUB_OUTPUT
            printf "drift_details<<EOF\n%b\nEOF\n" "$DRIFT_DETAILS" >> $GITHUB_OUTPUT
          else
            echo "drift=false" >> $GITHUB_OUTPUT
            echo "All sample projects match main version $MAIN_VERSION"
          fi

      - name: Open or Update Issue for Dependency Updates
        if: steps.dep-updates.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const title = '📦 Stable Dependency Updates Available';
            const labels = ['dependencies', 'automated'];
            const body = fs.readFileSync('/tmp/dep-updates.txt', 'utf8');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 100
            });

            const existingIssue = issues.find((issue) =>
              issue.title === title &&
              labels.every((label) => issue.labels.some((issueLabel) => issueLabel.name === label))
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `A scheduled scan detected that stable dependency updates are still available.\n\nLatest report:\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels
              });
            }

      - name: Open or Update Issue for Version Drift
        if: steps.version-drift.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '⚠️ Sample Project Version Drift Detected';
            const labels = ['dependencies', 'automated', 'examples'];
            const body = `## Sample Projects Out of Sync\n\nThe following sample project \`pom.xml\` files have a \`shaft_engine.version\` that does not match the current main \`pom.xml\` version.\n\n${{ steps.version-drift.outputs.drift_details }}\n\nRun the **Sync Sample Projects SHAFT Version** workflow to fix this automatically.`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 100
            });

            const existingIssue = issues.find((issue) =>
              issue.title === title &&
              labels.every((label) => issue.labels.some((issueLabel) => issueLabel.name === label))
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `A scheduled scan detected that sample project version drift still exists.\n\nLatest report:\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels
              });
            }

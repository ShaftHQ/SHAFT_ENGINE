name: E2E Local Tests

on:
  schedule:
    - cron: '00 1 * * *'
  workflow_dispatch:

env:
  GLOBAL_TESTING_SCOPE: "!%regex[.*DatabaseActions.*], !%regex[.*CLI.*], !%regex[.*DB.*], !%regex[.*Db.*], !%regex[.*db.*], !%regex[.*API.*], !%regex[.*Api.*], !%regex[.*api.*], !%regex[.*uestBuilder.*], !%regex[.*Rest.*], !%regex[.*Json.*], !%regex[.*JSON.*], !%regex[.*json.*], !%regex[.*ndroid.*], !%regex[.*IOS.*], !%regex[.*obile.*], !%regex[.*CucumberTests.*], !%regex[.*LT.*], !%regex[.*Flutter.*]"

jobs:
  Windows_Edge_Local:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Print Edge version
        continue-on-error: true
        run: (Get-Item (Get-Command msedge).Source).VersionInfo.ProductVersion
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=WINDOWS" "-DtargetBrowserName=MicrosoftEdge" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${GLOBAL_TESTING_SCOPE}"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Windows_Edge_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  MacOSX_Safari_Local:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=MAC" "-DtargetBrowserName=safari" "-DgenerateAllureReportArchive=true" "-Dtest=${GLOBAL_TESTING_SCOPE}"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: MacOSX_Safari_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Windows_Chrome_Local:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=WINDOWS" "-DtargetBrowserName=chrome" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${GLOBAL_TESTING_SCOPE}"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Windows_Chrome_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  MacOSX_Chrome_Local:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=MAC" "-DtargetBrowserName=chrome" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${GLOBAL_TESTING_SCOPE}"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: MacOSX_Chrome_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Windows_Edge_Cucumber_Local:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '16'
      - name: Print Edge version
        continue-on-error: true
        run: (Get-Item (Get-Command msedge).Source).VersionInfo.ProductVersion
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=WINDOWS" "-DmaximumPerformanceMode=2" "-DtargetBrowserName=MicrosoftEdge" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*CucumberTests.*]"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Windows_Edge_Cucumber_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Workflow_Summary:
    if: always()
    needs: [Windows_Edge_Local, MacOSX_Safari_Local, Windows_Chrome_Local, MacOSX_Chrome_Local, Windows_Edge_Cucumber_Local]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Consolidate Test Results
        uses: ./.github/actions/consolidate-test-results

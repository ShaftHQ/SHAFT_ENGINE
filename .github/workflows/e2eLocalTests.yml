name: E2E Local Tests

on:
  schedule:
    - cron: '00 1 * * *'
  workflow_dispatch:

env:
  GLOBAL_TESTING_SCOPE: "!%regex[.*DatabaseActions.*], !%regex[.*CLI.*], !%regex[.*DB.*], !%regex[.*Db.*], !%regex[.*db.*], !%regex[.*API.*], !%regex[.*Api.*], !%regex[.*api.*], !%regex[.*uestBuilder.*], !%regex[.*Rest.*], !%regex[.*Json.*], !%regex[.*JSON.*], !%regex[.*json.*], !%regex[.*ndroid.*], !%regex[.*IOS.*], !%regex[.*obile.*], !%regex[.*CucumberTests.*], !%regex[.*LT.*], !%regex[.*Flutter.*]"

jobs:
  Windows_Edge_Local:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Print Edge version
        continue-on-error: true
        run: (Get-Item (Get-Command msedge).Source).VersionInfo.ProductVersion
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=WINDOWS" "-DtargetBrowserName=MicrosoftEdge" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${GLOBAL_TESTING_SCOPE}"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Windows_Edge_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  MacOSX_Safari_Local:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=MAC" "-DtargetBrowserName=safari" "-DgenerateAllureReportArchive=true" "-Dtest=${GLOBAL_TESTING_SCOPE}"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: MacOSX_Safari_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Windows_Chrome_Local:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=WINDOWS" "-DtargetBrowserName=chrome" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${GLOBAL_TESTING_SCOPE}"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Windows_Chrome_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  MacOSX_Chrome_Local:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=MAC" "-DtargetBrowserName=chrome" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${GLOBAL_TESTING_SCOPE}"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: MacOSX_Chrome_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Windows_Edge_Cucumber_Local:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '16'
      - name: Print Edge version
        continue-on-error: true
        run: (Get-Item (Get-Command msedge).Source).VersionInfo.ProductVersion
      - name: Run tests
        continue-on-error: true
        run: mvn -e test "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=WINDOWS" "-DmaximumPerformanceMode=2" "-DtargetBrowserName=MicrosoftEdge" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*CucumberTests.*]"
      - name: Post-Test Report and Check
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Windows_Edge_Cucumber_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Workflow_Summary:
    if: always()
    needs: [Windows_Edge_Local, MacOSX_Safari_Local, Windows_Chrome_Local, MacOSX_Chrome_Local, Windows_Edge_Cucumber_Local]
    runs-on: ubuntu-latest
    steps:
      - name: Download all test summary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-summary-*
          path: test-summaries
          merge-multiple: false
      - name: Consolidate Test Results
        run: |
          echo "## 🧪 Consolidated Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          GRAND_TOTAL=0
          GRAND_PASSED=0
          GRAND_FAILED=0
          GRAND_BROKEN=0
          GRAND_SKIPPED=0
          GRAND_DURATION=0
          HAS_FAILURES=false

          echo "| Job | Total | ✅ Passed | ❌ Failed | 🔧 Broken | ⏭️ Skipped | ⏱️ Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|-----------|-----------|-----------|------------|------------|" >> $GITHUB_STEP_SUMMARY

          for summary_dir in test-summaries/test-summary-*/; do
            if [ -d "$summary_dir" ]; then
              for file in "$summary_dir"*.txt; do
                if [ -f "$file" ]; then
                  JOB=$(grep '^job=' "$file" | cut -d= -f2)
                  TOTAL=$(grep '^total=' "$file" | cut -d= -f2)
                  PASSED=$(grep '^passed=' "$file" | cut -d= -f2)
                  FAILED=$(grep '^failed=' "$file" | cut -d= -f2)
                  BROKEN=$(grep '^broken=' "$file" | cut -d= -f2)
                  SKIPPED=$(grep '^skipped=' "$file" | cut -d= -f2)
                  DURATION=$(grep '^duration=' "$file" | cut -d= -f2)

                  TOTAL=${TOTAL:-0}
                  PASSED=${PASSED:-0}
                  FAILED=${FAILED:-0}
                  BROKEN=${BROKEN:-0}
                  SKIPPED=${SKIPPED:-0}
                  DURATION=${DURATION:-0}

                  # Convert duration from ms to human readable
                  if [ "$DURATION" -gt 0 ] 2>/dev/null; then
                    DURATION_SEC=$((DURATION / 1000))
                    DURATION_MIN=$((DURATION_SEC / 60))
                    DURATION_REM=$((DURATION_SEC % 60))
                    DURATION_STR="${DURATION_MIN}m ${DURATION_REM}s"
                  else
                    DURATION_STR="N/A"
                  fi

                  # Add status emoji based on failures
                  if [ "$FAILED" -gt 0 ]; then
                    JOB_STATUS="❌ $JOB"
                    HAS_FAILURES=true
                  elif [ "$TOTAL" -eq 0 ]; then
                    JOB_STATUS="⚠️ $JOB"
                  else
                    JOB_STATUS="✅ $JOB"
                  fi

                  echo "| $JOB_STATUS | $TOTAL | $PASSED | $FAILED | $BROKEN | $SKIPPED | $DURATION_STR |" >> $GITHUB_STEP_SUMMARY

                  GRAND_TOTAL=$((GRAND_TOTAL + TOTAL))
                  GRAND_PASSED=$((GRAND_PASSED + PASSED))
                  GRAND_FAILED=$((GRAND_FAILED + FAILED))
                  GRAND_BROKEN=$((GRAND_BROKEN + BROKEN))
                  GRAND_SKIPPED=$((GRAND_SKIPPED + SKIPPED))
                  GRAND_DURATION=$((GRAND_DURATION + DURATION))
                fi
              done
            fi
          done

          # Grand total duration
          if [ "$GRAND_DURATION" -gt 0 ] 2>/dev/null; then
            GD_SEC=$((GRAND_DURATION / 1000))
            GD_MIN=$((GD_SEC / 60))
            GD_REM=$((GD_SEC % 60))
            GD_STR="${GD_MIN}m ${GD_REM}s"
          else
            GD_STR="N/A"
          fi

          echo "| **🏁 TOTAL** | **$GRAND_TOTAL** | **$GRAND_PASSED** | **$GRAND_FAILED** | **$GRAND_BROKEN** | **$GRAND_SKIPPED** | **$GD_STR** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status
          if [ "$HAS_FAILURES" = true ]; then
            echo "### ❌ Some tests failed. Check individual job reports for details." >> $GITHUB_STEP_SUMMARY
          elif [ "$GRAND_TOTAL" -eq 0 ]; then
            echo "### ⚠️ No test results found. Check workflow configuration." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          fi

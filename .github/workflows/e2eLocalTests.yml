name: Local E2E Tests

concurrency:
  group: e2e-local-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '00 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  GLOBAL_TESTING_SCOPE: "!%regex[.*DatabaseActions.*], !%regex[.*CLI.*], !%regex[.*DB.*], !%regex[.*Db.*], !%regex[.*db.*], !%regex[.*API.*], !%regex[.*Api.*], !%regex[.*api.*], !%regex[.*uestBuilder.*], !%regex[.*Rest.*], !%regex[.*Json.*], !%regex[.*JSON.*], !%regex[.*json.*], !%regex[.*ndroid.*], !%regex[.*IOS.*], !%regex[.*MobileWeb.*], !%regex[.*appium.Mobile.*], !%regex[.*properties.Mobile.*], !%regex[.*CucumberTests.*], !%regex[.*LT.*], !%regex[.*Flutter.*], !%regex[.*MoonTests.*]"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Workflow_Summary:
    if: always()
    needs:
      - Windows_Edge_Local
      - MacOSX_Safari_Local
      - Windows_Chrome_Local
      - Windows_SikuliX_Local
      - Windows_Appium_Desktop_Local
      - MacOSX_Chrome_Local
      - Windows_Edge_Cucumber_Local
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Consolidate Test Results
        uses: ./.github/actions/consolidate-test-results
        with:
          needs-json: ${{ toJSON(needs) }}

  Windows_Edge_Local:
    runs-on: windows-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      # .memory relation filenames exceed MAX_PATH with the runner workspace prefix;
      # without long paths, git checkout itself fails on Windows runners.
      - name: Enable Windows long paths
        run: git config --global core.longpaths true
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Install optional visual test runtime
        run: mvn -pl shaft-visual -am -e install "-DskipTests" "-Dgpg.skip"
      - name: Print Edge version
        continue-on-error: true
        run: (Get-Item (Get-Command msedge).Source).VersionInfo.ProductVersion
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DincludeVisualTestRuntime" "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=WINDOWS" "-DtargetBrowserName=MicrosoftEdge" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${{ env.GLOBAL_TESTING_SCOPE }}"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Windows_Edge_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  MacOSX_Safari_Local:
    runs-on: macos-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Install optional visual test runtime
        run: mvn -pl shaft-visual -am -e install "-DskipTests" "-Dgpg.skip"
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DincludeVisualTestRuntime" "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=MAC" "-DtargetBrowserName=safari" "-DgenerateAllureReportArchive=true" "-Dtest=${{ env.GLOBAL_TESTING_SCOPE }}, !%regex[.*MobileEmulation.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: MacOSX_Safari_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Windows_Chrome_Local:
    runs-on: windows-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      # .memory relation filenames exceed MAX_PATH with the runner workspace prefix;
      # without long paths, git checkout itself fails on Windows runners.
      - name: Enable Windows long paths
        run: git config --global core.longpaths true
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Install optional visual test runtime
        run: mvn -pl shaft-visual -am -e install "-DskipTests" "-Dgpg.skip"
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DincludeVisualTestRuntime" "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=WINDOWS" "-DtargetBrowserName=chrome" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${{ env.GLOBAL_TESTING_SCOPE }}"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Windows_Chrome_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Windows_SikuliX_Local:
    runs-on: windows-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      # .memory relation filenames exceed MAX_PATH with the runner workspace prefix;
      # without long paths, git checkout itself fails on Windows runners.
      - name: Enable Windows long paths
        run: git config --global core.longpaths true
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Run SikuliX Windows desktop flow
        continue-on-error: true
        run: mvn -pl shaft-sikulix -am -e test "-DrunWindowsDesktopE2E=true" "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=1" "-DautomaticallyOpen=false" "-DopenLighthouseReportWhileExecution=false" "-DgenerateAllureReportArchive=true" "-Dtest=SikuliWindowsDesktopE2ETest"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Windows_SikuliX_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          module-directory: shaft-sikulix

  Windows_Appium_Desktop_Local:
    runs-on: windows-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      # .memory relation filenames exceed MAX_PATH with the runner workspace prefix;
      # without long paths, git checkout itself fails on Windows runners.
      - name: Enable Windows long paths
        run: git config --global core.longpaths true
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '24'
      - name: Install Appium Windows driver
        run: |
          npm install -g appium@3.5.2
          appium driver install windows
          appium driver run windows install-wad
      - name: Verify WinAppDriver installation
        shell: powershell
        run: |
          # install-wad launches the WinAppDriver MSI via an unawaited elevated
          # Start-Process and returns immediately, so the binary may not exist yet.
          $winAppDriverPath = Join-Path ${env:ProgramFiles(x86)} 'Windows Application Driver\WinAppDriver.exe'
          $installed = $false
          for ($i = 0; $i -lt 60; $i++) {
            if (Test-Path $winAppDriverPath) {
              $installed = $true
              break
            }
            Start-Sleep -Seconds 1
          }
          if (-not $installed) {
            throw "WinAppDriver did not finish installing at $winAppDriverPath after 60s."
          }
      - name: Start Appium server
        shell: powershell
        run: |
          Start-Job -Name shaft-appium -ScriptBlock {
            appium --address 127.0.0.1 --port 4723 --log-level info
          } | Out-Null
          $ready = $false
          for ($i = 0; $i -lt 60; $i++) {
            try {
              Invoke-RestMethod -Uri "http://127.0.0.1:4723/status" -TimeoutSec 2 | Out-Null
              $ready = $true
              break
            } catch {
              Start-Sleep -Seconds 1
            }
          }
          if (-not $ready) {
            Receive-Job -Name shaft-appium -Keep
            throw "Appium server did not become ready."
          }
      - name: Run Appium Windows desktop flow
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DrunWindowsDesktopE2E=true" "-DdefaultElementIdentificationTimeout=5" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=http://127.0.0.1:4723" "-DtargetOperatingSystem=WINDOWS" "-DtargetBrowserName=WindowsApp" "-DheadlessExecution=false" "-DplatformName=Windows" "-Dmobile_automationName=Windows" "-Dmobile_app=C:\Windows\System32\notepad.exe" "-DautomaticallyOpen=false" "-DopenLighthouseReportWhileExecution=false" "-DgenerateAllureReportArchive=true" "-Dtest=WindowsDesktopAppiumE2ETest"
      - name: Stop Appium server
        if: always()
        shell: powershell
        run: |
          Receive-Job -Name shaft-appium -ErrorAction SilentlyContinue
          Get-Job -Name shaft-appium -ErrorAction SilentlyContinue | Stop-Job
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Windows_Appium_Desktop_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  MacOSX_Chrome_Local:
    runs-on: macos-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Install optional visual test runtime
        run: mvn -pl shaft-visual -am -e install "-DskipTests" "-Dgpg.skip"
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DincludeVisualTestRuntime" "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=MAC" "-DtargetBrowserName=chrome" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true" "-Dtest=${{ env.GLOBAL_TESTING_SCOPE }}"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: MacOSX_Chrome_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Windows_Edge_Cucumber_Local:
    runs-on: windows-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      # .memory relation filenames exceed MAX_PATH with the runner workspace prefix;
      # without long paths, git checkout itself fails on Windows runners.
      - name: Enable Windows long paths
        run: git config --global core.longpaths true
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: 'lts/*'
      - name: Print Edge version
        continue-on-error: true
        run: (Get-Item (Get-Command msedge).Source).VersionInfo.ProductVersion
      - name: Run tests
        continue-on-error: true
        run: mvn -pl shaft-engine -am -e test "-DdefaultElementIdentificationTimeout=5" "-DsetParallelMode=NONE" "-DretryMaximumNumberOfAttempts=1" "-DexecutionAddress=local" "-DtargetOperatingSystem=WINDOWS" "-DmaximumPerformanceMode=2" "-DtargetBrowserName=MicrosoftEdge" "-DgenerateAllureReportArchive=true" "-Dtest=%regex[.*CucumberTests.*]"
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Windows_Edge_Cucumber_Local
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

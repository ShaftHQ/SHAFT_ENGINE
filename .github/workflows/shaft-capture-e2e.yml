name: SHAFT Capture Browser E2E

concurrency:
  group: shaft-capture-e2e-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "shaft-capture/**"
      - ".github/workflows/shaft-capture-e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capture-browser-e2e:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "zulu"
          check-latest: true
      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.5
      - name: Install SHAFT Capture prerequisites without tests
        run: >-
          mvn --batch-mode
          -pl shaft-engine,shaft-pilot-core,shaft-capture
          -am install -DskipTests -Dgpg.skip
      - name: Run headless SHAFT Capture browser E2E tests
        run: >-
          mvn --batch-mode
          -pl shaft-capture test
          -DincludeCaptureBrowserE2E
          -Dtest=ManagedCaptureRecorderBrowserTest,CaptureGeneratedReplayBrowserTest
          -Dgpg.skip

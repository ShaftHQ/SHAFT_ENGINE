name: Publish shaft-mcp Distributions

on:
  workflow_run:
    workflows: ["Maven Central Continuous Delivery"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout released source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          check-latest: true
      - name: Read reactor version
        run: echo "VERSION=$(mvn -f pom.xml help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_ENV"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push OCI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: shaft-mcp/Dockerfile
          push: true
          tags: |
            ghcr.io/shafthq/shaft-engine-mcp:${{ env.VERSION }}
            ghcr.io/shafthq/shaft-engine-mcp:latest
      - name: Materialize and validate MCP registry metadata
        working-directory: shaft-mcp
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("server.json")
          rendered = path.read_text(encoding="utf-8").replace("@project.version@", os.environ["VERSION"])
          path.write_text(rendered, encoding="utf-8")
          json.loads(rendered)
          PY
          python3 -m pip install jsonschema --quiet
          python3 - <<'PY'
          import json
          import urllib.request
          from jsonschema import validate

          with open("server.json", encoding="utf-8") as source:
              server = json.load(source)
          with urllib.request.urlopen(server["$schema"]) as response:
              schema = json.load(response)
          validate(instance=server, schema=schema)
          PY
      - name: Publish MCP registry metadata
        working-directory: shaft-mcp
        run: |
          curl --fail --location \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar -xzf - mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

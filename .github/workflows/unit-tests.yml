name: Unit Tests

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, Monorepo-Shaft-mvp]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Workflow_Summary:
    if: always()
    needs: [Unit_shaft_core, Unit_shaft_api, Unit_shaft_db, Unit_shaft_web, Consumer_Smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Consolidate Test Results
        uses: ./.github/actions/consolidate-test-results
        with:
          needs-json: ${{ toJSON(needs) }}

  Unit_shaft_core:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Run tests
        continue-on-error: true
        run: mvn test -pl shaft-core -am "-DgenerateAllureReportArchive=true"
      - name: Consolidate surefire reports
        if: always()
        shell: bash
        run: |
          mkdir -p target/surefire-reports
          find . -path "*/target/surefire-reports/TEST-*.xml" ! -path "./target/*" \
            -exec cp {} target/surefire-reports/ \;
      - name: Collect Allure Report
        if: always()
        shell: bash
        run: |
          SHAFT_REPORT=$(find . -name "*AllureReport.html" ! -path "./allure-report/*" ! -path "*/target/*" ! -path "*/node_modules/*" 2>/dev/null | head -1)
          if [ -n "$SHAFT_REPORT" ]; then
            mkdir -p allure-report
            cp -r "$(dirname "$SHAFT_REPORT")"/. allure-report/
          fi
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Unit_shaft_core
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Unit_shaft_api:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Run tests
        continue-on-error: true
        run: mvn test -pl shaft-api -am "-DgenerateAllureReportArchive=true"
      - name: Consolidate surefire reports
        if: always()
        shell: bash
        run: |
          mkdir -p target/surefire-reports
          find . -path "*/target/surefire-reports/TEST-*.xml" ! -path "./target/*" \
            -exec cp {} target/surefire-reports/ \;
      - name: Collect Allure Report
        if: always()
        shell: bash
        run: |
          SHAFT_REPORT=$(find . -name "*AllureReport.html" ! -path "./allure-report/*" ! -path "*/target/*" ! -path "*/node_modules/*" 2>/dev/null | head -1)
          if [ -n "$SHAFT_REPORT" ]; then
            mkdir -p allure-report
            cp -r "$(dirname "$SHAFT_REPORT")"/. allure-report/
          fi
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Unit_shaft_api
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Unit_shaft_db:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Run tests
        continue-on-error: true
        run: mvn test -pl shaft-db -am "-DgenerateAllureReportArchive=true"
      - name: Consolidate surefire reports
        if: always()
        shell: bash
        run: |
          mkdir -p target/surefire-reports
          find . -path "*/target/surefire-reports/TEST-*.xml" ! -path "./target/*" \
            -exec cp {} target/surefire-reports/ \;
      - name: Collect Allure Report
        if: always()
        shell: bash
        run: |
          SHAFT_REPORT=$(find . -name "*AllureReport.html" ! -path "./allure-report/*" ! -path "*/target/*" ! -path "*/node_modules/*" 2>/dev/null | head -1)
          if [ -n "$SHAFT_REPORT" ]; then
            mkdir -p allure-report
            cp -r "$(dirname "$SHAFT_REPORT")"/. allure-report/
          fi
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Unit_shaft_db
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Unit_shaft_web:
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Run tests
        continue-on-error: true
        run: mvn test -pl shaft-web -am "-Dtest=%regex[.*unitTests.*]" "-DheadlessExecution=true" "-DgenerateAllureReportArchive=true"
      - name: Consolidate surefire reports
        if: always()
        shell: bash
        run: |
          mkdir -p target/surefire-reports
          find . -path "*/target/surefire-reports/TEST-*.xml" ! -path "./target/*" \
            -exec cp {} target/surefire-reports/ \;
      - name: Collect Allure Report
        if: always()
        shell: bash
        run: |
          SHAFT_REPORT=$(find . -name "*AllureReport.html" ! -path "./allure-report/*" ! -path "*/target/*" ! -path "*/node_modules/*" 2>/dev/null | head -1)
          if [ -n "$SHAFT_REPORT" ]; then
            mkdir -p allure-report
            cp -r "$(dirname "$SHAFT_REPORT")"/. allure-report/
          fi
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Unit_shaft_web
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  Consumer_Smoke:
    if: always()
    needs: [Unit_shaft_core, Unit_shaft_api, Unit_shaft_db, Unit_shaft_web]
    runs-on: ubuntu-latest
    outputs:
      job: ${{ steps.post_test_report.outputs.job }}
      total: ${{ steps.post_test_report.outputs.total }}
      passed: ${{ steps.post_test_report.outputs.passed }}
      failed: ${{ steps.post_test_report.outputs.failed }}
      broken: ${{ steps.post_test_report.outputs.broken }}
      skipped: ${{ steps.post_test_report.outputs.skipped }}
      duration: ${{ steps.post_test_report.outputs.duration }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup Test Environment
        uses: ./.github/actions/setup-test-env
        with:
          node-version: '20'
      - name: Install snapshot to local .m2
        run: mvn install -DskipTests "-Dgpg.skip=true"
      - name: Run shaft-api-consumer tests
        continue-on-error: true
        run: mvn test -f shaft-web/src/main/resources/examples/consumer/shaft-api-consumer/pom.xml "-Dallure.results.directory=allure-results-api"
      - name: Run shaft-web-consumer tests
        continue-on-error: true
        run: mvn test -f shaft-web/src/main/resources/examples/consumer/shaft-web-consumer/pom.xml "-Dallure.results.directory=allure-results-web"
      - name: Run shaft-engine-consumer tests
        continue-on-error: true
        run: mvn test -f shaft-web/src/main/resources/examples/consumer/shaft-engine-consumer/pom.xml "-Dallure.results.directory=allure-results-engine"
      - name: Merge consumer allure results
        if: always()
        shell: bash
        run: |
          mkdir -p allure-results
          for dir in allure-results-api allure-results-web allure-results-engine; do
            [ -d "$dir" ] && find "$dir" -maxdepth 1 -name "*.json" -exec cp {} allure-results/ \; 2>/dev/null || true
          done
      - name: Consolidate surefire reports
        if: always()
        shell: bash
        run: |
          mkdir -p target/surefire-reports
          find . -path "*/target/surefire-reports/TEST-*.xml" ! -path "./target/*" \
            -exec cp {} target/surefire-reports/ \;
      - name: Collect Allure Report
        if: always()
        shell: bash
        run: |
          SHAFT_REPORT=$(find . -name "*AllureReport.html" ! -path "./allure-report/*" ! -path "*/target/*" ! -path "*/node_modules/*" 2>/dev/null | head -1)
          if [ -n "$SHAFT_REPORT" ]; then
            mkdir -p allure-report
            cp -r "$(dirname "$SHAFT_REPORT")"/. allure-report/
          fi
      - name: Post-Test Report and Check
        id: post_test_report
        if: always()
        uses: ./.github/actions/post-test-report
        with:
          job-name: Consumer_Smoke
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

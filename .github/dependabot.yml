version: 2
updates:

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "00:00"
      timezone: "Africa/Cairo"
    labels:
      - "dependencies"
      - "github-actions"

  # Maintain dependencies for maven
  - package-ecosystem: "maven"
    directories:
      - "/"
      - "/shaft-engine"
      - "/shaft-pilot-core"
      - "/shaft-capture"
      - "/shaft-ai"
      - "/shaft-browserstack"
      - "/shaft-video"
      - "/shaft-visual"
      - "/shaft-mcp"
      - "/shaft-bom"
      - "/legacy-shaft-engine"
      - "/report-aggregate"
    schedule:
      interval: "daily"
      time: "00:00"
      timezone: "Africa/Cairo"
    labels:
      - "dependencies"
    groups:
      aligned-maven-dependencies:
        group-by: dependency-name

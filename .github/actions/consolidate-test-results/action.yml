name: 'Consolidate Test Results'
description: 'Writes a consolidated job-level test result summary to GITHUB_STEP_SUMMARY using the needs context, without requiring separate summary artifacts.'
inputs:
  needs-json:
    description: 'JSON representation of the needs context (pass as ${{ toJSON(needs) }})'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Consolidate Test Results
      shell: bash
      run: |
        NEEDS_JSON='${{ inputs.needs-json }}'

        {
          echo "## 🧪 Consolidated Test Results"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"

          HAS_FAILURES=false
          TOTAL_JOBS=0
          PASSED_JOBS=0

          while IFS= read -r line; do
            JOB=$(echo "$line" | cut -d'|' -f1 | xargs)
            RESULT=$(echo "$line" | cut -d'|' -f2 | xargs)
            TOTAL_JOBS=$((TOTAL_JOBS + 1))
            case "$RESULT" in
              success)
                STATUS="✅ Passed"
                PASSED_JOBS=$((PASSED_JOBS + 1))
                ;;
              failure)
                STATUS="❌ Failed"
                HAS_FAILURES=true
                ;;
              cancelled)
                STATUS="🚫 Cancelled"
                ;;
              skipped)
                STATUS="⊘ Skipped"
                ;;
              *)
                STATUS="⚠️ $RESULT"
                ;;
            esac
            echo "| $JOB | $STATUS |"
          done < <(echo "$NEEDS_JSON" | python3 -c "import json,sys; needs=json.load(sys.stdin); [print(job+'|'+data.get('result','unknown')) for job,data in needs.items()]")

          echo ""
          if [ "$HAS_FAILURES" = true ]; then
            echo "### ❌ Some jobs failed. Check individual job summaries and Allure report artifacts for details."
          elif [ "$TOTAL_JOBS" -eq 0 ]; then
            echo "### ⚠️ No job results found."
          else
            echo "### ✅ All $TOTAL_JOBS jobs passed!"
          fi
        } > "$GITHUB_STEP_SUMMARY"

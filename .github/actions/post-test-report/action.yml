name: 'Post-Test Report and Check'
description: 'Uploads coverage, generates Allure report artifacts, creates test summary, and checks test results using Allure data'
outputs:
  job:
    description: 'Job display name'
    value: ${{ steps.collect_results.outputs.job }}
  total:
    description: 'Total executed tests'
    value: ${{ steps.collect_results.outputs.total }}
  passed:
    description: 'Total passed tests'
    value: ${{ steps.collect_results.outputs.passed }}
  failed:
    description: 'Total failed tests'
    value: ${{ steps.collect_results.outputs.failed }}
  broken:
    description: 'Total broken tests'
    value: ${{ steps.collect_results.outputs.broken }}
  skipped:
    description: 'Total skipped tests'
    value: ${{ steps.collect_results.outputs.skipped }}
  duration:
    description: 'Execution duration in milliseconds'
    value: ${{ steps.collect_results.outputs.duration }}
inputs:
  job-name:
    description: 'Name of the job (used for naming the Allure report artifact)'
    required: true

  module-directory:
    description: 'Module that produced the test and report outputs'
    required: false
    default: 'shaft-engine'

  codecov-token:
    description: 'Codecov upload token'
    required: false
    default: ''
  coverage-files:
    description: 'Candidate JaCoCo XML files to upload. Defaults to the module required report.'
    required: false
    default: ''
  require-coverage:
    description: 'Whether JaCoCo coverage is expected and should be required for this module'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Upload coverage to Codecov
      if: always()
      uses: ./.github/actions/upload-jacoco-coverage
      with:
        codecov-token: ${{ inputs.codecov-token }}
        files: ${{ inputs.coverage-files }}
        required-files: ./${{ inputs.module-directory }}/target/jacoco/jacoco.xml
        allow-missing-coverage: ${{ inputs.require-coverage != 'true' }}
    - name: Generate Allure Report Fallback
      if: always()
      shell: bash
      run: |
        # Derive Allure 3 version from Internal.java — the single source of truth for the engine.
        ALLURE3_VERSION=$(grep -A2 'Key("allure3Version")' \
          shaft-engine/src/main/java/com/shaft/properties/internal/Internal.java \
          | grep '@DefaultValue' | sed 's/.*@DefaultValue("\([^"]*\)").*/\1/')
        ALLURE3_VERSION=${ALLURE3_VERSION:-3.3.1}
        if [ -d "${{ inputs.module-directory }}/allure-results" ] && [ -n "$(ls -A "${{ inputs.module-directory }}/allure-results" 2>/dev/null)" ]; then
          # Generate single-file report if SHAFT didn't already create one
          if ! ls "${{ inputs.module-directory }}"/allure-report/*AllureReport.html 1>/dev/null 2>&1; then
            CONFIG_FILE="${{ inputs.module-directory }}/allurerc.yaml"
            if [ ! -f "$CONFIG_FILE" ]; then
              CONFIG_FILE="${RUNNER_TEMP:-/tmp}/shaft-allurerc.yaml"
              cat > "$CONFIG_FILE" <<'YAML'
        plugins:
          awesome:
            options:
              reportName: "SHAFT-powered test report"
              singleFile: true
        YAML
            fi
            npx --yes allure@${ALLURE3_VERSION} generate "${{ inputs.module-directory }}/allure-results" --config "$CONFIG_FILE" -o "${{ inputs.module-directory }}/allure-report" 2>/dev/null || true
            if [ -f "${{ inputs.module-directory }}/allure-report/index.html" ]; then
              mv "${{ inputs.module-directory }}/allure-report/index.html" "${{ inputs.module-directory }}/allure-report/AllureReport.html"
            fi
          fi
        fi
    - name: Rename Allure Report for Upload
      if: always()
      shell: bash
      run: mv "${{ inputs.module-directory }}"/allure-report/*AllureReport.html "${{ inputs.module-directory }}/allure-report/${{ inputs.job-name }}_Allure.html" 2>/dev/null || true
    - name: Upload Allure Report as Pipeline Artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        path: "${{ inputs.module-directory }}/allure-report/${{ inputs.job-name }}_Allure.html"
        archive: false
    - name: Write Summary and Check Test Results
      id: collect_results
      if: always()
      shell: bash
      run: |
        # Extract a numeric field from Allure 3 summary.json.
        # Returns empty string (defaults to 0 at call site) when the field is absent —
        # e.g. "failed" is omitted when all tests pass. The "|| true" prevents
        # set -e / pipefail from failing the step when grep finds no match.
        extract_field() {
          local field="$1"
          local file="$2"
          grep -o "\"${field}\" *: *[0-9]*" "$file" 2>/dev/null | head -1 | grep -o '[0-9]*' || true
        }

        # Count raw Allure result files before interpreting the generated summary.
        # An empty raw-results directory means the run is invalid, even if a stale summary exists.
        ALLURE_RESULTS_DIR="${{ inputs.module-directory }}/allure-results"
        RESULT_COUNT=$(find "$ALLURE_RESULTS_DIR" -name '*-result.json' -type f 2>/dev/null | wc -l | tr -d ' ')
        RESULT_COUNT=${RESULT_COUNT:-0}
        echo "Allure raw result files: $RESULT_COUNT"

        # SHAFT writes summary.json at the report root after generating the single-file HTML.
        ALLURE_SUMMARY="${{ inputs.module-directory }}/allure-report/summary.json"

        if [ -f "$ALLURE_SUMMARY" ]; then
          TOTAL=$(extract_field total "$ALLURE_SUMMARY");   TOTAL=${TOTAL:-0}
          PASSED=$(extract_field passed "$ALLURE_SUMMARY"); PASSED=${PASSED:-0}
          FAILED=$(extract_field failed "$ALLURE_SUMMARY"); FAILED=${FAILED:-0}
          BROKEN=$(extract_field broken "$ALLURE_SUMMARY"); BROKEN=${BROKEN:-0}
          SKIPPED=$(extract_field skipped "$ALLURE_SUMMARY"); SKIPPED=${SKIPPED:-0}
          DURATION=$(extract_field duration "$ALLURE_SUMMARY"); DURATION=${DURATION:-0}
        else
          TOTAL=0; PASSED=0; FAILED=0; BROKEN=0; SKIPPED=0; DURATION=0
        fi

        # Compute job wallclock duration using the GitHub Actions job timing recorded by setup-test-env.
        # SHAFT_JOB_STARTED_S is set to $(date +%s) at the start of setup-test-env.
        # This uses date +%s which is supported on Linux (GNU), macOS (BSD), and Windows (Git Bash).
        if [ -n "$SHAFT_JOB_STARTED_S" ]; then
          NOW_S=$(date +%s)
          COMPUTED_DURATION=$(( (NOW_S - SHAFT_JOB_STARTED_S) * 1000 ))
          if [ "$COMPUTED_DURATION" -gt 0 ]; then
            DURATION=$COMPUTED_DURATION
          fi
        else
          echo "::warning::SHAFT_JOB_STARTED_S is not set; duration may be inaccurate. Ensure setup-test-env runs before post-test-report."
        fi

        # Write the per-job Allure results table to this job's step summary.
        {
          echo "## 📊 ${{ inputs.job-name }} — Test Results"
          echo "| Total | ✅ Passed | ❌ Failed | 💥 Broken | ⊘ Skipped |"
          echo "|------:|----------:|----------:|----------:|----------:|"
          echo "| $TOTAL | $PASSED | $FAILED | $BROKEN | $SKIPPED |"
        } >> "$GITHUB_STEP_SUMMARY"

        {
          echo "job=${{ inputs.job-name }}"
          echo "total=$TOTAL"
          echo "passed=$PASSED"
          echo "failed=$FAILED"
          echo "broken=$BROKEN"
          echo "skipped=$SKIPPED"
          echo "duration=$DURATION"
        } >> "$GITHUB_OUTPUT"

        echo "=== Checking test results using Allure report data ==="
        echo "Allure Report Summary: Total=$TOTAL, Passed=$PASSED, Failed=$FAILED, Broken=$BROKEN, Skipped=$SKIPPED"

        # Primary check: use Allure report data.
        if [ -f "$ALLURE_SUMMARY" ]; then
          if [ "$RESULT_COUNT" -eq 0 ]; then
            echo "::error::No raw Allure result files were generated in $ALLURE_RESULTS_DIR. Treating this as an invalid test run."
            exit 1
          fi
          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No tests were executed according to the Allure summary. Check test configuration."
            exit 1
          fi
          if [ "$FAILED" -gt 0 ] || [ "$BROKEN" -gt 0 ]; then
            if command -v python3 >/dev/null 2>&1; then
              ALLURE_FAILURE_SOURCE=""
              if [ -d "${{ inputs.module-directory }}/allure-results" ]; then
                ALLURE_FAILURE_SOURCE="${{ inputs.module-directory }}/allure-results"
              elif [ -d "${{ inputs.module-directory }}/allure-report" ]; then
                ALLURE_FAILURE_SOURCE="${{ inputs.module-directory }}/allure-report"
              fi
              if [ -n "$ALLURE_FAILURE_SOURCE" ]; then
                {
                  echo ""
                  echo "### ❌ Failed and broken test methods"
                  python3 scripts/ci/extract_allure_failures.py "$ALLURE_FAILURE_SOURCE" || true
                } >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
            echo "::error::Allure report shows $FAILED failed and $BROKEN broken test(s) out of $TOTAL total. Check the Allure report artifact for details."
            exit 1
          fi
          echo "All tests passed according to Allure report."
        else
          if [ "$RESULT_COUNT" -eq 0 ]; then
            echo "::error::No Allure summary or raw result files were generated for ${{ inputs.module-directory }}."
            exit 1
          fi
          echo "::warning::Allure report summary not found. Falling back to surefire reports."
          # Fallback: Check surefire reports if allure data is unavailable.
          if [ -d "${{ inputs.module-directory }}/target/surefire-reports" ]; then
            if grep -rq "failures=\"[1-9]" "${{ inputs.module-directory }}/target/surefire-reports/" || grep -rq "errors=\"[1-9]" "${{ inputs.module-directory }}/target/surefire-reports/"; then
              echo "::error::Surefire reports indicate test failures. Failing the job."
              exit 1
            fi
          fi
        fi

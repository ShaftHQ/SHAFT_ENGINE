name: 'Post-Test Report and Check'
description: 'Uploads coverage, generates Allure report artifacts, creates test summary, and checks test results using Allure data'
inputs:
  job-name:
    description: 'Name of the job (used for naming the Allure report artifact)'
    required: true
  codecov-token:
    description: 'Codecov upload token'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Upload coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        token: ${{ inputs.codecov-token }}
        fail_ci_if_error: false
        files: ./target/jacoco/jacoco.xml
        verbose: true
        disable_search: true
    - name: Generate Allure Report Fallback
      if: always()
      shell: bash
      run: |
        # Derive Allure 3 version from Internal.java — the single source of truth for the engine.
        ALLURE3_VERSION=$(grep -A2 'Key("allure3Version")' \
          src/main/java/com/shaft/properties/internal/Internal.java \
          | grep '@DefaultValue' | sed 's/.*@DefaultValue("\([^"]*\)").*/\1/')
        ALLURE3_VERSION=${ALLURE3_VERSION:-3.4.0}
        if [ -d "allure-results" ] && [ -n "$(ls -A allure-results 2>/dev/null)" ]; then
          # Generate single-file report if SHAFT didn't already create one
          if ! ls allure-report/*AllureReport.html 1>/dev/null 2>&1; then
            npx --yes allure@${ALLURE3_VERSION} generate allure-results -o allure-report 2>/dev/null || true
            if [ -f "allure-report/index.html" ]; then
              mv allure-report/index.html allure-report/AllureReport.html
            fi
          fi
        fi
    - name: Rename Allure Report for Upload
      if: always()
      shell: bash
      run: mv allure-report/*AllureReport.html "allure-report/${{ inputs.job-name }}_Allure.html" 2>/dev/null || true
    - name: Upload Allure Report as Pipeline Artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        path: "allure-report/${{ inputs.job-name }}_Allure.html"
        archive: false
    - name: Write Summary and Check Test Results
      if: always()
      shell: bash
      run: |
        # Extract a numeric field from Allure 3 summary.json.
        # Returns empty string (defaults to 0 at call site) when the field is absent —
        # e.g. "failed" is omitted when all tests pass. The "|| true" prevents
        # set -e / pipefail from failing the step when grep finds no match.
        extract_field() {
          local field="$1"
          local file="$2"
          grep -o "\"${field}\" *: *[0-9]*" "$file" 2>/dev/null | head -1 | grep -o '[0-9]*' || true
        }

        # SHAFT writes summary.json at the report root after generating the single-file HTML.
        ALLURE_SUMMARY="allure-report/summary.json"

        if [ -f "$ALLURE_SUMMARY" ]; then
          TOTAL=$(extract_field total "$ALLURE_SUMMARY");   TOTAL=${TOTAL:-0}
          PASSED=$(extract_field passed "$ALLURE_SUMMARY"); PASSED=${PASSED:-0}
          FAILED=$(extract_field failed "$ALLURE_SUMMARY"); FAILED=${FAILED:-0}
          BROKEN=$(extract_field broken "$ALLURE_SUMMARY"); BROKEN=${BROKEN:-0}
          SKIPPED=$(extract_field skipped "$ALLURE_SUMMARY"); SKIPPED=${SKIPPED:-0}
          DURATION=$(extract_field duration "$ALLURE_SUMMARY"); DURATION=${DURATION:-0}
        else
          TOTAL=0; PASSED=0; FAILED=0; BROKEN=0; SKIPPED=0; DURATION=0
        fi

        # Write per-job Allure results table at the top of this job's step summary.
        # The test-summary/action step below will append surefire XML detail after this.
        {
          echo "## 📊 ${{ inputs.job-name }} — Test Results"
          echo "| Total | ✅ Passed | ❌ Failed | 💥 Broken | ⊘ Skipped |"
          echo "|------:|----------:|----------:|----------:|----------:|"
          echo "| $TOTAL | $PASSED | $FAILED | $BROKEN | $SKIPPED |"
        } > "$GITHUB_STEP_SUMMARY"

        # Upload a tiny stats file so the Workflow_Summary job can aggregate across all jobs.
        mkdir -p allure-stats
        {
          echo "job=${{ inputs.job-name }}"
          echo "total=$TOTAL"
          echo "passed=$PASSED"
          echo "failed=$FAILED"
          echo "broken=$BROKEN"
          echo "skipped=$SKIPPED"
          echo "duration=$DURATION"
        } > "allure-stats/${{ inputs.job-name }}.txt"

        echo "=== Checking test results using Allure report data ==="
        echo "Allure Report Summary: Total=$TOTAL, Passed=$PASSED, Failed=$FAILED, Broken=$BROKEN, Skipped=$SKIPPED"

        # Primary check: use Allure report data.
        if [ -f "$ALLURE_SUMMARY" ]; then
          if [ "$TOTAL" -eq 0 ]; then
            echo "::warning::No tests were executed. Check test configuration."
          fi
          if [ "$FAILED" -gt 0 ] || [ "$BROKEN" -gt 0 ]; then
            echo "::error::Allure report shows $FAILED failed and $BROKEN broken test(s) out of $TOTAL total. Check the Allure report artifact for details."
            exit 1
          fi
          echo "All tests passed according to Allure report."
        else
          echo "::warning::Allure report summary not found. Falling back to surefire reports."
          # Fallback: Check surefire reports if allure data is unavailable.
          if [ -d "target/surefire-reports" ]; then
            if grep -rq "failures=\"[1-9]" target/surefire-reports/ || grep -rq "errors=\"[1-9]" target/surefire-reports/; then
              echo "::error::Surefire reports indicate test failures. Failing the job."
              exit 1
            fi
          fi
        fi
    - name: Upload Allure Stats for Consolidation
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: allure-stats-${{ inputs.job-name }}
        path: allure-stats/${{ inputs.job-name }}.txt
        archive: false
    - name: Test Summary
      if: always()
      continue-on-error: true
      uses: test-summary/action@v2
      with:
        paths: "target/surefire-reports/TEST-*.xml"
        show: "fail"

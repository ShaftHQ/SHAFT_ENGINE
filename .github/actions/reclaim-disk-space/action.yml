name: 'Reclaim Disk Space'
description: 'Frees disk space on the GitHub-hosted runner by removing unused preinstalled toolchains and Docker images, optionally pruning build outputs that later steps no longer need.'
inputs:
  prune-build-outputs:
    description: 'Whether to additionally prune reactor target/ directories and the Docker build/image cache. Never touches ~/.m2, so a later Maven step can still reuse already-resolved dependencies.'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Report disk usage before reclaim
      shell: bash
      run: df -h / || true
    - name: Remove unused preinstalled runner toolchains
      shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
        docker image prune --all --force || true
    - name: Prune build outputs
      if: inputs.prune-build-outputs == 'true'
      shell: bash
      run: |
        find . -type d -name target -prune -exec rm -rf {} + || true
        docker builder prune --all --force || true
        docker image prune --all --force || true
    - name: Report disk usage after reclaim
      shell: bash
      run: df -h / || true

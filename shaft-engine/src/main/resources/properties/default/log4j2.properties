name=PropertiesConfig
property.logFilePath=${sys:shaft.log.file:-target/logs/log4j.log}
appender.console.type=Console
appender.console.name=STDOUT
appender.console.layout.type=PatternLayout
appender.console.layout.disableAnsi=false
appender.console.layout.noConsoleNoAnsi=false
appender.console.layout.charset=UTF-8
appender.console.layout.pattern=%highlight{[%p]}{FATAL=red blink, ERROR=red bold, WARN=yellow bold, INFO=fg_#0060a8 bold, DEBUG=fg_#43b02a bold, TRACE=black} %style{%d{HH:mm:ss}}{bright_black} %style{\u2502}{bright_black} %m%n
appender.console.filter.threshold.type=ThresholdFilter
appender.console.filter.threshold.level=info
appender.file.type=RollingFile
appender.file.name=LOGFILE
appender.file.fileName=${logFilePath}
appender.file.filePattern=${logFilePath}.%d{yyyy-MM-dd}-%i.gz
appender.file.layout.type=PatternLayout
appender.file.layout.charset=UTF-8
appender.file.layout.pattern=[%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %c{1} - %msg%n
appender.file.filter.threshold.type=ThresholdFilter
appender.file.filter.threshold.level=debug
appender.file.policies.type=Policies
appender.file.policies.size.type=SizeBasedTriggeringPolicy
appender.file.policies.size.size=10MB
appender.file.strategy.type=DefaultRolloverStrategy
appender.file.strategy.max=5
appender.ReportPortalAppender.type=ReportPortalLog4j2Appender
appender.ReportPortalAppender.name=ReportPortalAppender
appender.ReportPortalAppender.layout.type=PatternLayout
appender.ReportPortalAppender.layout.charset=UTF-8
appender.ReportPortalAppender.layout.pattern=[%-5level] %msg%n
appender.ReportPortalAppender.filter.threshold.type=ThresholdFilter
appender.ReportPortalAppender.filter.threshold.level=debug
appender.asyncConsole.type=Async
appender.asyncConsole.name=ASYNC_STDOUT
appender.asyncConsole.bufferSize=1024
appender.asyncConsole.blocking=true
appender.asyncConsole.shutdownTimeout=5000
appender.asyncConsole.appenderRef.console.type=AppenderRef
appender.asyncConsole.appenderRef.console.ref=STDOUT
appender.asyncFile.type=Async
appender.asyncFile.name=ASYNC_LOGFILE
appender.asyncFile.bufferSize=4096
appender.asyncFile.blocking=true
appender.asyncFile.shutdownTimeout=5000
appender.asyncFile.appenderRef.file.type=AppenderRef
appender.asyncFile.appenderRef.file.ref=LOGFILE
appender.asyncReportPortal.type=Async
appender.asyncReportPortal.name=ASYNC_REPORT_PORTAL
appender.asyncReportPortal.bufferSize=1024
appender.asyncReportPortal.blocking=true
appender.asyncReportPortal.shutdownTimeout=5000
appender.asyncReportPortal.appenderRef.reportPortal.type=AppenderRef
appender.asyncReportPortal.appenderRef.reportPortal.ref=ReportPortalAppender
logger.rp.name=rp
logger.rp.level=WARN
logger.reportportal.name=com.epam.reportportal
logger.reportportal.level=WARN
rootLogger=info, ASYNC_STDOUT, ASYNC_LOGFILE, ASYNC_REPORT_PORTAL
logger.app.name=org.apache.http.impl.client
logger.app.level=WARN

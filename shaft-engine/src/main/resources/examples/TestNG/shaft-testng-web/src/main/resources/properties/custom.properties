# Configure your properties here:
# https://shafthq.github.io/docs/reference/properties/custom-properties-generator
#
## by default SHAFT only attaches a screenshot to the Allure report for FAILED assertions; set
## this to BALANCED to capture a screenshot on every assertion (pass or fail), or FULL to also
## capture non-assertion actions like clicks and typing
evidenceLevel=BALANCED

## Wikipedia's Main_Page is a content-heavy portal-style page (rotating featured content, many
## images/widgets); its header search box and logo can occasionally take longer than the 10s
## default to finish rendering, especially on a resource-shared grid node. Give element lookups
## extra headroom rather than flake on a slow-but-legitimate page load (issue #3792/#3788).
defaultElementIdentificationTimeout=20
